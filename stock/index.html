<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Control | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight">Inventory Control</h1>
            <p class="text-slate-500 text-sm">Urus baki stok kasut dan aksesori.</p>
        </div>
        <div class="flex gap-3">
            <div class="glass px-4 py-2 rounded-2xl text-center">
                <p class="text-[10px] text-slate-400 uppercase font-bold">Total Items</p>
                <p class="text-xl font-bold text-blue-500" id="total-items">0</p>
            </div>
            <div class="glass px-4 py-2 rounded-2xl text-center border-l-4 border-l-red-500">
                <p class="text-[10px] text-slate-400 uppercase font-bold">Low Stock</p>
                <p class="text-xl font-bold text-red-500" id="low-stock-count">0</p>
            </div>
        </div>
    </div>

    <div class="mb-6">
        <div class="relative max-w-md">
            <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
            <input type="text" id="searchInput" onkeyup="searchStock()" placeholder="Cari nama produk..." class="w-full p-4 pl-12 rounded-2xl glass border-none focus:ring-2 focus:ring-blue-600 outline-none">
        </div>
    </div>

    <div class="overflow-x-auto rounded-3xl glass border border-slate-800">
        <table class="w-full text-left border-collapse">
            <thead class="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                <tr>
                    <th class="p-5">Produk</th>
                    <th class="p-5">Kategori</th>
                    <th class="p-5 text-center">Baki Stok</th>
                    <th class="p-5">Status</th>
                    <th class="p-5 text-right">Tindakan</th>
                </tr>
            </thead>
            <tbody id="stock-table-body" class="text-sm divide-y divide-slate-800">
                </tbody>
        </table>
    </div>

    <script>
        // Data Stok Dummy
        let inventory = [
            { id: 1, name: "Sneakers Pro White", category: "Kasut", stock: 45, min: 10 },
            { id: 2, name: "Formal Leather Black", category: "Kasut", stock: 8, min: 10 },
            { id: 3, name: "Sport Socks (3-pack)", category: "Aksesori", stock: 120, min: 20 },
            { id: 4, name: "Shoe Cleaner Kit", category: "Aksesori", stock: 5, min: 15 },
            { id: 5, name: "Running Shoes Blue", category: "Kasut", stock: 12, min: 10 }
        ];

        function renderStock() {
            const tbody = document.getElementById('stock-table-body');
            let lowStock = 0;

            tbody.innerHTML = inventory.map(item => {
                const isLow = item.stock <= item.min;
                if (isLow) lowStock++;

                let statusColor = "bg-emerald-500";
                let statusText = "Stabil";
                
                if (item.stock <= 0) {
                    statusColor = "bg-slate-500";
                    statusText = "Habis";
                } else if (item.stock <= item.min) {
                    statusColor = "bg-red-500 animate-pulse";
                    statusText = "Kritikal";
                } else if (item.stock <= item.min * 2) {
                    statusColor = "bg-amber-500";
                    statusText = "Rendah";
                }

                return `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-5 font-bold">${item.name}</td>
                        <td class="p-5 text-slate-400">${item.category}</td>
                        <td class="p-5">
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-lg font-mono">${item.stock}</span>
                                <div class="w-20 h-1 bg-slate-800 rounded-full overflow-hidden">
                                    <div class="h-full ${statusColor}" style="width: ${Math.min((item.stock/100)*100, 100)}%"></div>
                                </div>
                            </div>
                        </td>
                        <td class="p-5">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase text-white ${statusColor}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="p-5 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="adjustStock(${item.id}, -1)" class="w-8 h-8 rounded-lg glass hover:bg-red-500/20 text-red-500 transition">
                                    <i class="fas fa-minus text-xs"></i>
                                </button>
                                <button onclick="adjustStock(${item.id}, 1)" class="w-8 h-8 rounded-lg glass hover:bg-emerald-500/20 text-emerald-500 transition">
                                    <i class="fas fa-plus text-xs"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('total-items').innerText = inventory.length;
            document.getElementById('low-stock-count').innerText = lowStock;
        }

        function adjustStock(id, amount) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                item.stock = Math.max(0, item.stock + amount);
                renderStock();
            }
        }

        function searchStock() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#stock-table-body tr');
            
            rows.forEach(row => {
                const name = row.cells[0].innerText.toLowerCase();
                row.style.display = name.includes(input) ? '' : 'none';
            });
        }

        window.onload = renderStock;
    </script>
</body>
</html>
