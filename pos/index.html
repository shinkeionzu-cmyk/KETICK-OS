<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETICK POS | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Floating Bar Fix - Duduk atas navigasi bawah */
        #floating-bar { 
            position: fixed;
            bottom: 95px; /* Tinggi navigasi bawah (75px) + gap (20px) */
            left: 16px;
            right: 16px;
            z-index: 150; /* Lebih tinggi dari mobile-nav (100) */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #cart-panel { 
            z-index: 200; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }
        #cart-panel.show { transform: translateY(0); }

        .product-card:active { transform: scale(0.95); background: rgba(59, 130, 246, 0.1); }
        .pay-method.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-blue-500 font-black tracking-tighter italic text-2xl uppercase">Ketick<span class="text-white">Pos</span></h1>
            <div class="flex items-center gap-1.5 mt-1">
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                <span id="status-text" class="text-[8px] font-bold text-slate-500 uppercase tracking-[0.2em]">Sistem Online</span>
            </div>
        </div>
        <button onclick="clearCart()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-red-400">
            <i class="fas fa-trash-alt text-sm"></i>
        </button>
    </div>

    <div id="product-grid" class="grid grid-cols-2 gap-4 pb-[180px]">
        </div>

    <div id="floating-bar" class="glass p-5 rounded-[2.5rem] flex justify-between items-center shadow-2xl border-blue-500/20 hidden">
        <div class="pl-2">
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-0.5">Total</p>
            <h3 id="bar-total" class="text-xl font-black text-emerald-400 tracking-tighter">RM 0.00</h3>
        </div>
        <button onclick="toggleCart()" class="bg-blue-600 text-white px-8 py-4 rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-600/30">
            Bayar <i class="fas fa-arrow-right ml-2"></i>
        </button>
    </div>

    <div id="cart-panel" class="fixed inset-0 glass backdrop-blur-3xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleCart()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center"><i class="fas fa-times"></i></button>
            <h2 class="font-black text-lg uppercase tracking-tighter">Sahkan Jualan</h2>
            <div class="w-12"></div>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar">
            </div>

        <div class="mt-8 space-y-6">
            <div class="grid grid-cols-3 gap-3">
                <button onclick="setMethod('Tunai', this)" class="pay-method active glass p-4 rounded-3xl text-[9px] font-bold uppercase tracking-widest flex flex-col items-center gap-2 border-white/5">
                    <i class="fas fa-money-bill-wave text-lg"></i> Tunai
                </button>
                <button onclick="setMethod('Online', this)" class="pay-method glass p-4 rounded-3xl text-[9px] font-bold uppercase tracking-widest flex flex-col items-center gap-2 border-white/5">
                    <i class="fas fa-mobile-alt text-lg"></i> Online
                </button>
                <button onclick="setMethod('Card', this)" class="pay-method glass p-4 rounded-3xl text-[9px] font-bold uppercase tracking-widest flex flex-col items-center gap-2 border-white/5">
                    <i class="fas fa-credit-card text-lg"></i> Kad
                </button>
            </div>

            <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-white/10">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Jumlah Perlu Bayar</span>
                <span id="cart-total" class="text-2xl font-black text-blue-500 italic">RM 0.00</span>
            </div>

            <button onclick="confirmSale()" class="w-full bg-blue-600 text-white font-black py-6 rounded-[2rem] text-xs uppercase tracking-[0.3em] shadow-2xl shadow-blue-600/40 mb-4">
                Simpan & Rekod Jualan
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let cart = [];
        let method = "Tunai";

        // Tarik Produk (Koleksi: inventory)
        db.collection("inventory").onSnapshot(snap => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div onclick="addToCart('${doc.id}', '${p.name}', ${p.price})" class="product-card glass p-6 rounded-[2.5rem] relative overflow-hidden transition-all border-white/5">
                        <div class="w-10 h-10 bg-blue-600/10 rounded-xl flex items-center justify-center mb-4 text-blue-500">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <h3 class="font-black text-[10px] uppercase truncate mb-1">${p.name}</h3>
                        <p class="text-blue-500 font-black text-xs italic">RM ${parseFloat(p.price).toFixed(2)}</p>
                        <p class="text-[8px] font-bold text-slate-600 mt-2 uppercase">Baki: ${p.stock || 0}</p>
                    </div>
                `;
            });
        });

        function addToCart(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) cart[idx].qty += 1;
            else cart.push({ id, name, price, qty: 1 });
            updateUI();
        }

        function updateUI() {
            const bar = document.getElementById('floating-bar');
            const list = document.getElementById('cart-items');
            list.innerHTML = "";
            let total = 0;

            cart.forEach((item, i) => {
                total += (item.price * item.qty);
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center border-white/5 shadow-lg">
                        <div>
                            <p class="text-[10px] font-black uppercase text-blue-400">${item.name}</p>
                            <p class="text-[9px] font-bold text-slate-500 mt-1">RM ${item.price.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-4 glass px-4 py-2 rounded-2xl">
                            <button onclick="updateQty(${i}, -1)" class="text-xs font-bold opacity-50">-</button>
                            <span class="text-xs font-black">${item.qty}</span>
                            <button onclick="updateQty(${i}, 1)" class="text-xs font-bold text-blue-500">+</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('bar-total').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('cart-total').innerText = `RM ${total.toFixed(2)}`;
            
            if(cart.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');
        }

        function updateQty(i, change) {
            cart[i].qty += change;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateUI();
        }

        function toggleCart() { document.getElementById('cart-panel').classList.toggle('show'); }

        function setMethod(m, btn) {
            method = m;
            document.querySelectorAll('.pay-method').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function clearCart() { cart = []; updateUI(); }

        async function confirmSale() {
            if(cart.length === 0) return;
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            
            try {
                // Rekod Sales
                await db.collection("sales").add({
                    items: cart,
                    totalValue: total,
                    paymentMethod: method,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    date: new Date().toISOString().split('T')[0]
                });

                // Update Stok
                for(let item of cart) {
                    const ref = db.collection("inventory").doc(item.id);
                    await db.runTransaction(async (t) => {
                        const doc = await t.get(ref);
                        const newStock = (doc.data().stock || 0) - item.qty;
                        t.update(ref, { stock: Math.max(0, newStock) });
                    });
                }

                alert("Selesai! RM " + total.toFixed(2) + " direkod.");
                clearCart();
                toggleCart();
            } catch(e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
