<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[32px] border border-slate-800 shadow-2xl text-center">
        <h2 class="text-2xl font-extrabold mb-2">Ketick OS Setup</h2>
        <p id="status" class="text-slate-400 text-sm mb-8">Sila tekan butang di bawah untuk masukkan data stok awal ke Cloud...</p>
        
        <button onclick="runSetup()" id="btn-setup" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-900/20">
            MASUKKAN DATA STOK
        </button>
    </div>

    <script type="module">
        // Path dibetulkan untuk repository KETICK-OS
        import { db, collection, addDoc } from "/KETICK-OS/firebase-config.js";

        window.runSetup = async function() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-setup');
            
            status.innerText = "⏳ Sedang berhubung dengan Firebase...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const initialStock = [
                { name: "Sneakers Pro", category: "Kasut", stock: 50, price: 150.00 },
                { name: "Formal Leather", category: "Kasut", stock: 20, price: 280.00 },
                { name: "Sport Socks", category: "Aksesori", stock: 100, price: 15.00 },
                { name: "Shoe Cleaner", category: "Aksesori", stock: 30, price: 45.00 }
            ];

            try {
                for (let item of initialStock) {
                    await addDoc(collection(db, "inventory"), item);
                }
                status.innerHTML = "<b class='text-emerald-500 text-lg'>✅ BERJAYA!</b><br>Data dah masuk Cloud. Awak boleh buka POS sekarang.";
                btn.style.display = "none";
            } catch (e) {
                status.innerHTML = "<b class='text-red-500'>❌ Ralat:</b> " + e.message;
                btn.disabled = false;
                btn.style.opacity = "1";
                console.error(e);
            }
        }
    </script>
</body>
</html>
