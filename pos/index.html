<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; height: 100vh; overflow: hidden; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Layout Grid */
        .pos-grid { 
            display: grid; grid-template-rows: auto 1fr auto; 
            height: 100vh; gap: 8px; padding: 8px;
        }

        #productGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .product-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.2rem; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .product-card-img { height: 50px; width: 50px; object-fit: cover; border-radius: 10px; background: #1e293b; }
    </style>
</head>
<body>

    <div class="pos-grid">
        <header class="flex justify-between items-center px-2 py-1">
            <h1 class="text-blue-500 font-black text-xl leading-none">POS TERMINAL</h1>
        </header>

        <section class="flex flex-col overflow-hidden bg-slate-900/20 rounded-[2rem] border border-white/5">
            <div class="p-3 flex justify-between items-center glass border-b border-white/5">
                <input type="text" id="searchItem" placeholder="Cari..." class="bg-white/5 border border-white/10 rounded-xl py-1 px-3 text-[10px] w-full text-white outline-none">
            </div>
            <div id="productGridContainer" class="flex-grow overflow-y-auto p-3 no-scrollbar">
                <div id="productGrid"></div>
            </div>
        </section>

        <section class="bg-slate-900/40 rounded-[2rem] border border-white/10 glass p-5 mb-2">
            <div class="flex justify-between items-center">
                <span id="totalAmount" class="text-3xl font-black text-emerald-400">RM 0.00</span>
                <button class="bg-blue-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Bayar</button>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { /* Config Firebase Awak */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. LOGIK HANTAR ARAHAN KE PARENT
        const scrollContainer = document.getElementById('productGridContainer');
        let lastScrollY = 0;

        scrollContainer.addEventListener('scroll', () => {
            if (scrollContainer.scrollTop > lastScrollY && scrollContainer.scrollTop > 20) {
                // Beritahu parent (index.html) untuk sorok nav
                window.parent.postMessage('hideNav', '*');
            } else {
                // Beritahu parent (index.html) untuk tunjuk nav
                window.parent.postMessage('showNav', '*');
            }
            lastScrollY = scrollContainer.scrollTop;
        });

        // Load Produk dari Firestore
        db.collection("inventory").onSnapshot(snap => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image || ''}" class="product-card-img">
                        <p class="text-[7px] font-bold mt-2">${p.name}</p>
                        <p class="text-blue-400 font-black text-[9px]">RM ${p.price}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
