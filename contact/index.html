<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Contacts | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black uppercase tracking-tight">CRM Contacts</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase">Urus Pelanggan & Pembekal</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-600/20 transition">
            <i class="fas fa-user-plus"></i>
        </button>
    </div>

    <div class="flex gap-2 mb-6 p-1 glass rounded-2xl">
        <button onclick="filterContacts('SEMUA')" class="filter-btn flex-1 py-3 rounded-xl bg-blue-600 text-[10px] font-bold transition">SEMUA</button>
        <button onclick="filterContacts('Pelanggan')" class="filter-btn flex-1 py-3 rounded-xl text-[10px] font-bold opacity-50 transition">PELANGGAN</button>
        <button onclick="filterContacts('Pembekal')" class="filter-btn flex-1 py-3 rounded-xl text-[10px] font-bold opacity-50 transition">PEMBEKAL</button>
    </div>

    <div id="contact-list" class="space-y-3 pb-24">
        <div class="text-center py-10 opacity-30 text-xs">Memuatkan senarai...</div>
    </div>

    <div id="contactModal" class="modal">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem] relative">
            <h2 class="text-xl font-bold mb-6">Daftar Kenalan Baru</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Nama Penuh</label>
                    <input type="text" id="cName" placeholder="Contoh: Ali Bin Abu" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none mt-1">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">No. Telefon</label>
                        <input type="tel" id="cPhone" placeholder="6012..." class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Kategori</label>
                        <select id="cType" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/10 outline-none mt-1 text-white">
                            <option value="Pelanggan">Pelanggan</option>
                            <option value="Pembekal">Pembekal</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Alamat Penuh</label>
                    <textarea id="cAddress" rows="3" placeholder="No. 123, Jalan Baru..." class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none mt-1"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal(false)" class="flex-1 p-4 rounded-2xl hover:bg-white/5 font-bold transition">Batal</button>
                    <button onclick="saveContact()" class="flex-1 p-4 rounded-2xl bg-blue-600 hover:bg-blue-700 font-bold transition">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, onSnapshot, addDoc, query, orderBy } from "../firebase-config.js";

        const contactList = document.getElementById('contact-list');
        let allContacts = [];

        // Ambil Data Real-time
        onSnapshot(query(collection(db, "contacts"), orderBy("name", "asc")), (snapshot) => {
            allContacts = [];
            snapshot.forEach(doc => allContacts.push({ id: doc.id, ...doc.data() }));
            renderContacts(allContacts);
        });

        function renderContacts(data) {
            if (data.length === 0) {
                contactList.innerHTML = `<div class="text-center py-10 opacity-30 text-xs">Tiada rekod dijumpai.</div>`;
                return;
            }

            contactList.innerHTML = data.map(c => `
                <div class="glass p-5 rounded-[1.8rem] flex justify-between items-center border-l-4 ${c.type === 'Pelanggan' ? 'border-blue-500' : 'border-purple-500'}">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center font-black text-blue-500">
                            ${c.name.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <p class="text-sm font-extrabold text-white">${c.name}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mb-1">${c.type}</p>
                            <p class="text-[9px] text-slate-400 max-w-[150px] truncate"><i class="fas fa-map-marker-alt mr-1"></i>${c.address || 'Tiada alamat'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${c.phone}" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-emerald-500 border border-white/5"><i class="fas fa-phone-alt text-xs"></i></a>
                        <a href="https://wa.me/${c.phone}" target="_blank" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-blue-400 border border-white/5"><i class="fab fa-whatsapp text-sm"></i></a>
                    </div>
                </div>
            `).join('');
        }

        window.saveContact = async () => {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const type = document.getElementById('cType').value;
            const address = document.getElementById('cAddress').value;

            if (!name || !phone) return alert("Nama dan No. Telefon wajib diisi!");

            try {
                await addDoc(collection(db, "contacts"), {
                    name, phone, type, address,
                    createdAt: new Date()
                });
                toggleModal(false);
                document.getElementById('cName').value = "";
                document.getElementById('cPhone').value = "";
                document.getElementById('cAddress').value = "";
            } catch (e) { console.error(e); }
        };

        window.filterContacts = (type) => {
            // Update UI Button
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.classList.add('opacity-50');
                btn.classList.remove('bg-blue-600');
            });
            event.target.classList.remove('opacity-50');
            event.target.classList.add('bg-blue-600');

            if (type === 'SEMUA') {
                renderContacts(allContacts);
            } else {
                const filtered = allContacts.filter(c => c.type === type);
                renderContacts(filtered);
            }
        };

        window.toggleModal = (show) => {
            document.getElementById('contactModal').classList.toggle('active', show);
        };
    </script>
</body>
</html>
