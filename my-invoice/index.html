<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326",
            measurementId: "G-YH99RHS74G"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeEditId = null;
        let contactsData = [];

        // Listen ke Invoices & Contacts
        function initData() {
            // Invoices
            const qInv = query(collection(db, "invoices"), orderBy("createdAt", "desc"));
            onSnapshot(qInv, (snapshot) => {
                const invoices = [];
                snapshot.forEach((doc) => invoices.push({ id: doc.id, ...doc.data() }));
                window.currentInvoices = invoices;
                renderHistoryUI(invoices);
                if (!activeEditId) updateDocID();
            });

            // Contacts (Untuk dropdown)
            const qCont = query(collection(db, "contacts"), orderBy("name", "asc"));
            onSnapshot(qCont, (snapshot) => {
                contactsData = [];
                const list = document.getElementById('contact-options');
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const c = doc.data();
                    contactsData.push(c);
                    const opt = document.createElement('option');
                    opt.value = c.name;
                    list.appendChild(opt);
                });
            });
        }

        // Auto-fill phone bila nama dipilih
        window.syncContactInfo = () => {
            const selectedName = document.getElementById('custName').value;
            const contact = contactsData.find(c => c.name === selectedName);
            if(contact) {
                document.getElementById('custPhone').value = contact.phone;
            }
        };

        window.updateDocID = () => {
            const type = document.getElementById('doc-type').value;
            const prefix = type === 'QUOTATION' ? 'QT' : (type === 'RECEIPT' ? 'RC' : 'INV');
            const sameTypeDocs = window.currentInvoices?.filter(d => (d.docType || 'INVOICE') === type) || [];
            const nextId = String(sameTypeDocs.length + 1).padStart(4, '0');
            document.getElementById('doc-id').innerText = `${prefix}-2026-${nextId}`;
        };

        window.saveToFirestore = async (data) => {
            try {
                const items = [];
                document.querySelectorAll('#item-list tr').forEach(tr => {
                    const descInput = tr.querySelector('input[type="text"]');
                    if(descInput && descInput.value) {
                        items.push({
                            desc: descInput.value,
                            qty: tr.querySelector('.qty').value,
                            price: tr.querySelector('.price').value
                        });
                    }
                });

                const payload = {
                    ...data,
                    docType: document.getElementById('doc-type').value,
                    items: items,
                    updatedAt: serverTimestamp()
                };

                if (activeEditId) {
                    await updateDoc(doc(db, "invoices", activeEditId), payload);
                    activeEditId = null;
                    document.getElementById('save-btn-text').innerText = "SIMPAN & PDF";
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "invoices"), payload);
                }
                return true;
            } catch (e) {
                console.error("Ralat: ", e);
                return false;
            }
        };

        window.deleteInvoice = async (id) => {
            if(confirm("Padam rekod ini?")) {
                try { await deleteDoc(doc(db, "invoices", id)); } catch (e) { alert(e.message); }
            }
        };

        window.setActiveEdit = (id) => { activeEditId = id; };
        initData();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; padding-bottom: 50px; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-active { background: #3b82f6; opacity: 1 !important; }
        @media print { .no-print { display: none !important; } body { background: white !important; color: black !important; padding: 0; } .glass { border: none; background: transparent; } }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="main-app">
        <div class="no-print mb-8">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-black uppercase tracking-widest text-blue-500">Ketick Billing</h1>
                    <p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase">CRM Integrated</p>
                </div>
                <select id="doc-type" onchange="updateUIForType()" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-[10px] font-bold uppercase outline-none">
                    <option value="INVOICE">Invoice</option>
                    <option value="QUOTATION">Quotation</option>
                    <option value="RECEIPT">Receipt</option>
                </select>
            </div>
            
            <div class="flex gap-2 p-1 glass rounded-2xl mb-6">
                <button onclick="switchTab('creator')" id="tab-creator" class="tab-active flex-1 py-2 rounded-xl text-[10px] font-bold transition">PENYEDIAAN</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 rounded-xl text-[10px] font-bold opacity-50 transition">REKOD</button>
            </div>
        </div>

        <div id="section-creator">
            <div class="no-print flex gap-2 mb-4 justify-end">
                <button onclick="resetForm()" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition">
                    <i class="fas fa-file-plus mr-1"></i> BARU
                </button>
                <button onclick="generatePDF(true)" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold transition hover:bg-blue-500 shadow-lg shadow-blue-500/20">
                    <i class="fas fa-save mr-1"></i> <span id="save-btn-text">SIMPAN & PDF</span>
                </button>
            </div>

            <div id="document-area" class="glass p-6 lg:p-10 rounded-[2.5rem] relative border border-white/5">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <input type="text" id="bizName" value="KETICK OS" class="bg-transparent text-2xl font-black text-blue-500 outline-none w-full">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Digital Business Solution</p>
                    </div>
                    <div class="text-right">
                        <h3 class="text-3xl font-black uppercase tracking-tighter" id="display-doc-title">Invoice</h3>
                        <p class="text-xs text-slate-500 font-mono" id="doc-id">...</p>
                    </div>
                </div>
                
                <hr class="border-slate-800 mb-8 opacity-50">

                <div class="grid grid-cols-2 gap-8 mb-10 text-sm">
                    <div>
                        <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-2">Kepada:</p>
                        <input type="text" id="custName" list="contact-options" oninput="syncContactInfo()" placeholder="Pilih atau Taip Nama" class="w-full bg-transparent font-bold outline-none border-b border-dashed border-slate-700 pb-1 mb-1">
                        <datalist id="contact-options"></datalist>
                        <input type="text" id="custPhone" placeholder="No. Tel" class="w-full bg-transparent text-[11px] outline-none border-b border-dashed border-slate-700 opacity-60">
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-2">Tarikh:</p>
                        <input type="date" id="doc-date" class="bg-transparent font-bold text-xs outline-none text-right">
                    </div>
                </div>

                <div class="mb-10 overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[9px] font-black text-slate-500 border-b border-slate-800 uppercase">
                                <th class="pb-3">Item / Deskripsi</th>
                                <th class="pb-3 text-center w-16">Unit</th>
                                <th class="pb-3 text-right">Harga (RM)</th>
                            </tr>
                        </thead>
                        <tbody id="item-list">
                            <tr class="border-b border-slate-800/50">
                                <td class="py-4"><input type="text" placeholder="Masukkan butiran..." class="bg-transparent text-sm font-semibold w-full outline-none text-slate-300"></td>
                                <td class="py-4 text-center"><input type="number" value="1" oninput="calculateTotal()" class="bg-transparent text-sm text-center w-full outline-none qty text-slate-300"></td>
                                <td class="py-4 text-right"><input type="number" value="0.00" oninput="calculateTotal()" class="bg-transparent text-sm text-right w-full outline-none price text-slate-300"></td>
                            </tr>
                        </tbody>
                    </table>
                    <button onclick="addItem()" class="no-print mt-4 text-[10px] font-bold text-blue-500 uppercase">
                        <i class="fas fa-plus mr-1"></i> Tambah Item
                    </button>
                </div>

                <div class="flex justify-between items-center pt-6 border-t border-slate-800">
                    <div id="receipt-stamp" class="hidden border-4 border-emerald-500/30 text-emerald-500/30 font-black px-4 py-1 rounded-xl rotate-[-15deg] uppercase text-xl">PAID</div>
                    <div class="text-right ml-auto">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-1 tracking-widest">Jumlah Keseluruhan</p>
                        <h2 class="text-3xl font-black text-emerald-500">RM <span id="grand-total">0.00</span></h2>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-history" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="history-container"></div>
        </div>
    </div>

    <script>
        document.getElementById('doc-date').valueAsDate = new Date();

        function updateUIForType() {
            const type = document.getElementById('doc-type').value;
            const titleEl = document.getElementById('display-doc-title');
            const stamp = document.getElementById('receipt-stamp');
            titleEl.innerText = type;
            if(type === 'QUOTATION') {
                titleEl.className = "text-3xl font-black uppercase tracking-tighter text-amber-500";
                stamp.classList.add('hidden');
            } else if(type === 'RECEIPT') {
                titleEl.className = "text-3xl font-black uppercase tracking-tighter text-emerald-500";
                stamp.classList.remove('hidden');
            } else {
                titleEl.className = "text-3xl font-black uppercase tracking-tighter text-slate-300";
                stamp.classList.add('hidden');
            }
            if(typeof window.updateDocID === 'function') window.updateDocID();
        }

        function switchTab(tab) {
            document.getElementById('section-creator').classList.toggle('hidden', tab !== 'creator');
            document.getElementById('section-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('tab-creator').classList.toggle('tab-active', tab === 'creator');
            document.getElementById('tab-history').classList.toggle('tab-active', tab === 'history');
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.qty').forEach((qty, i) => {
                total += (parseFloat(qty.value || 0) * parseFloat(document.querySelectorAll('.price')[i].value || 0));
            });
            document.getElementById('grand-total').innerText = total.toFixed(2);
        }

        function addItem(desc = "", qty = 1, price = "0.00") {
            const row = `<tr class="border-b border-slate-800/50">
                <td class="py-4"><input type="text" value="${desc}" placeholder="Butiran..." class="bg-transparent text-sm font-semibold w-full outline-none text-slate-300"></td>
                <td class="py-4 text-center"><input type="number" value="${qty}" oninput="calculateTotal()" class="bg-transparent text-sm text-center w-full outline-none qty text-slate-300"></td>
                <td class="py-4 text-right"><input type="number" value="${price}" oninput="calculateTotal()" class="bg-transparent text-sm text-right w-full outline-none price text-slate-300"></td>
            </tr>`;
            document.getElementById('item-list').insertAdjacentHTML('beforeend', row);
            calculateTotal();
        }

        function resetForm() {
            document.getElementById('custName').value = '';
            document.getElementById('custPhone').value = '';
            document.getElementById('doc-date').valueAsDate = new Date();
            document.getElementById('item-list').innerHTML = '';
            addItem();
            calculateTotal();
            window.updateDocID();
            document.getElementById('save-btn-text').innerText = "SIMPAN & PDF";
        }

        async function generatePDF(shouldSave = false) {
            const invNo = document.getElementById('doc-id').innerText;
            const element = document.getElementById('document-area');
            if(shouldSave) {
                const success = await window.saveToFirestore({
                    invoiceNo: invNo,
                    customerName: document.getElementById('custName').value || 'Pelanggan',
                    customerPhone: document.getElementById('custPhone').value,
                    totalAmount: document.getElementById('grand-total').innerText,
                    date: document.getElementById('doc-date').value
                });
                if(!success) return;
            }
            const opt = {
                margin: 10,
                filename: `KETICK_${invNo}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#020617' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => { if(shouldSave) resetForm(); });
        }

        window.renderHistoryUI = (invoices) => {
            const container = document.getElementById('history-container');
            if(invoices.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center py-20 opacity-30 text-xs uppercase tracking-widest">Tiada Rekod</p>';
                return;
            }
            container.innerHTML = invoices.map(inv => `
                <div class="glass p-6 rounded-[2rem] border border-white/5 flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-white/5 mb-1 inline-block opacity-60">${inv.docType || 'INVOICE'}</span>
                            <h4 class="font-bold text-lg uppercase tracking-tight">${inv.customerName}</h4>
                            <p class="text-[10px] opacity-40 font-mono">${inv.invoiceNo} • ${inv.date}</p>
                        </div>
                        <span class="text-xl font-black ${inv.docType === 'QUOTATION' ? 'text-amber-500' : (inv.docType === 'RECEIPT' ? 'text-emerald-500' : 'text-blue-400')} font-mono text-right leading-none">RM ${inv.totalAmount}</span>
                    </div>
                    <div class="flex gap-2 border-t border-white/5 pt-4">
                        <button onclick="editInvoice('${inv.id}')" class="flex-1 bg-white/5 py-3 rounded-xl text-[9px] font-bold uppercase hover:bg-blue-600 transition">Buka</button>
                        <button onclick="deleteInvoice('${inv.id}')" class="bg-red-900/10 text-red-500 px-4 rounded-xl hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        };

        window.editInvoice = (id) => {
            const inv = window.currentInvoices.find(i => i.id === id);
            if(!inv) return;
            window.setActiveEdit(id);
            document.getElementById('doc-type').value = inv.docType || 'INVOICE';
            updateUIForType();
            document.getElementById('save-btn-text').innerText = "KEMASKINI & PDF";
            document.getElementById('doc-id').innerText = inv.invoiceNo;
            document.getElementById('custName').value = inv.customerName;
            document.getElementById('custPhone').value = inv.customerPhone || '';
            document.getElementById('doc-date').value = inv.date;
            document.getElementById('item-list').innerHTML = '';
            if(inv.items) inv.items.forEach(item => addItem(item.desc, item.qty, item.price));
            else addItem();
            calculateTotal();
            switchTab('creator');
        };
    </script>
</body>
</html>
