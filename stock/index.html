<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Control | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight">Inventory Control</h1>
            <p class="text-slate-500 text-sm">Urus baki stok kasut dan aksesori.</p>
        </div>
        <div class="flex gap-3">
            <div class="glass px-4 py-2 rounded-2xl text-center">
                <p class="text-[10px] text-slate-400 uppercase font-bold">Total Items</p>
                <p class="text-xl font-bold text-blue-500" id="total-items">0</p>
            </div>
            <div class="glass px-4 py-2 rounded-2xl text-center border-l-4 border-l-red-500">
                <p class="text-[10px] text-slate-400 uppercase font-bold">Low Stock</p>
                <p class="text-xl font-bold text-red-500" id="low-stock-count">0</p>
            </div>
        </div>
    </div>

    <div class="mb-6">
        <div class="relative max-w-md">
            <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
            <input type="text" id="searchInput" onkeyup="searchStock()" placeholder="Cari nama produk..." class="w-full p-4 pl-12 rounded-2xl glass border-none focus:ring-2 focus:ring-blue-600 outline-none">
        </div>
    </div>

    <div class="overflow-x-auto rounded-3xl glass border border-slate-800">
        <table class="w-full text-left border-collapse">
            <thead class="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                <tr>
                    <th class="p-5">Produk</th>
                    <th class="p-5">Kategori</th>
                    <th class="p-5 text-center">Baki Stok</th>
                    <th class="p-5">Status</th>
                    <th class="p-5 text-right">Tindakan</th>
                </tr>
            </thead>
            <tbody id="stock-table-body" class="text-sm divide-y divide-slate-800">
                </tbody>
        </table>
    </div>

        <script type="module">
        // 1. Import fungsi yang diperlukan dari config awak kat luar
        import { db, collection, onSnapshot, doc, updateDoc } from "../firebase-config.js";

        const tbody = document.getElementById('stock-table-body');
        const totalItemsEl = document.getElementById('total-items');
        const lowStockCountEl = document.getElementById('low-stock-count');

        // 2. Ambil data real-time dari Cloud Firebase
        onSnapshot(collection(db, "inventory"), (snapshot) => {
            let lowStock = 0;
            let inventoryData = [];
            
            snapshot.forEach((doc) => {
                inventoryData.push({ id: doc.id, ...doc.data() });
            });

            // Update UI senarai kasut
            tbody.innerHTML = inventoryData.map(item => {
                const minStock = 10; // Kita anggap baki 10 tu dah rendah
                const isLow = item.stock <= minStock;
                if (isLow) lowStock++;

                let statusColor = "bg-emerald-500";
                let statusText = "Stabil";
                
                if (item.stock <= 0) {
                    statusColor = "bg-slate-500";
                    statusText = "Habis";
                } else if (isLow) {
                    statusColor = "bg-red-500 animate-pulse";
                    statusText = "Kritikal";
                }

                return `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-5 font-bold text-slate-100">${item.name}</td>
                        <td class="p-5 text-slate-400">${item.category || 'Kasut'}</td>
                        <td class="p-5 text-center">
                            <span class="text-lg font-mono text-white">${item.stock}</span>
                        </td>
                        <td class="p-5">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase text-white ${statusColor}">
                                ${statusText}
                            </span>
                        </td>
                        <td class="p-5 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="updateStock('${item.id}', ${item.stock - 1})" class="w-10 h-10 rounded-xl glass hover:bg-red-500/20 text-red-500 transition border border-white/5">
                                    <i class="fas fa-minus text-xs"></i>
                                </button>
                                <button onclick="updateStock('${item.id}', ${item.stock + 1})" class="w-10 h-10 rounded-xl glass hover:bg-emerald-500/20 text-emerald-500 transition border border-white/5">
                                    <i class="fas fa-plus text-xs"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            // Update statistik kat atas tu
            totalItemsEl.innerText = inventoryData.length;
            lowStockCountEl.innerText = lowStock;
        });

        // 3. Fungsi untuk simpan baki baru ke Firebase bila butang ditekan
        window.updateStock = async (id, newStock) => {
            if (newStock < 0) return; // Takleh bagi stok negatif
            try {
                const itemRef = doc(db, "inventory", id);
                await updateDoc(itemRef, { stock: newStock });
            } catch (error) {
                console.error("Gagal update stok:", error);
            }
        };

        // Fungsi carian (Search)
        window.searchStock = () => {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#stock-table-body tr');
            rows.forEach(row => {
                const name = row.cells[0].innerText.toLowerCase();
                row.style.display = name.includes(input) ? '' : 'none';
            });
        };
    </script>
</body>
</html>
