<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Susunan Grid Utama */
        .pos-grid { 
            display: grid; 
            grid-template-rows: auto 1fr 280px auto; /* Header, Katalog, Pesanan, Nav-Bar */
            height: 100vh; 
            gap: 8px; 
            padding: 8px;
        }

        /* Desktop Mode */
        @media (min-width: 1024px) { 
            .pos-grid { 
                grid-template-columns: 1fr 380px; 
                grid-template-rows: auto 1fr auto; 
            } 
        }

        /* Grid Produk 3 Kolum */
        #productGrid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .product-card-img { 
            height: 55px; 
            width: 55px; 
            object-fit: cover; 
            border-radius: 10px; 
            margin-bottom: 6px;
            background: #1e293b;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.5; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { opacity: 1; color: #3b82f6; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="pos-grid">
        <header class="flex justify-between items-center px-2 py-1">
            <div>
                <h1 class="text-blue-500 font-black text-xl leading-none">POS</h1>
                <p class="text-[7px] text-emerald-500 font-bold uppercase tracking-widest leading-none mt-1">• System Online</p>
            </div>
            <div class="w-9 h-9 rounded-full bg-blue-600 border border-white/10 flex items-center justify-center text-[11px] font-black shadow-lg shadow-blue-600/20">
                AD
            </div>
        </header>

        <section class="flex flex-col overflow-hidden bg-slate-900/20 rounded-[2rem] border border-white/5">
            <div class="p-3 flex justify-between items-center glass border-b border-white/5">
                <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">Katalog</span>
                <div class="relative">
                    <input type="text" id="searchItem" placeholder="Cari..." 
                        class="bg-white/5 border border-white/10 rounded-xl py-1.5 px-3 pl-8 text-[10px] focus:outline-none focus:border-blue-500 w-36 transition-all text-white">
                    <i class="fas fa-search absolute left-3 top-2.5 text-[9px] text-slate-500"></i>
                </div>
            </div>
            <div id="productGrid" class="flex-grow overflow-y-auto p-3 no-scrollbar">
                </div>
        </section>

        <section class="flex flex-col bg-slate-900/40 rounded-[2rem] border border-white/10 glass overflow-hidden">
            <div class="p-4 border-b border-white/5 flex justify-between items-center">
                <h2 class="font-black text-[10px] uppercase tracking-[0.2em] text-slate-400">Pesanan Aktif</h2>
                <button onclick="clearCart()" class="text-[8px] text-red-500 font-black uppercase bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20">Clear</button>
            </div>
            
            <div id="cartItems" class="flex-grow overflow-y-auto p-4 space-y-2 no-scrollbar">
                </div>

            <div class="p-5 bg-blue-600/5 border-t border-white/5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total</span>
                    <span id="totalAmount" class="text-3xl font-black text-emerald-400 tracking-tighter">RM 0.00</span>
                </div>
                <button onclick="openPayment()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-xl shadow-blue-600/30 btn-press transition-all">
                    Bayar Sekarang
                </button>
            </div>
        </section>

        <nav class="glass rounded-2xl flex justify-around items-center py-3 border-t border-white/10">
            <div class="nav-item"><i class="fas fa-th-large text-lg"></i><span>Home</span></div>
            <div class="nav-item active"><i class="fas fa-cash-register text-lg"></i><span>POS</span></div>
            <div class="nav-item"><i class="fas fa-shopping-cart text-lg"></i><span>Sales</span></div>
            <div class="nav-item"><i class="fas fa-box text-lg"></i><span>Stock</span></div>
            <div class="nav-item"><i class="fas fa-ellipsis-h text-lg"></i><span>More</span></div>
        </nav>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-[#020617]/95 z-[100] hidden flex items-end md:items-center justify-center p-4 backdrop-blur-md">
        <div class="w-full max-w-md glass rounded-[3rem] border border-white/10 p-8 shadow-2xl">
            <div class="text-center mb-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-1">Jumlah Perlu Dibayar</p>
                <h2 id="pay-grand-total" class="text-5xl font-black tracking-tighter text-blue-500">RM 0.00</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="setPaymentMethod('cash')" id="btn-cash" class="py-4 rounded-2xl border-2 border-blue-600 bg-blue-600/10 text-blue-500 font-black text-[10px] uppercase tracking-widest transition-all">Tunai</button>
                <button onclick="setPaymentMethod('qr')" id="btn-qr" class="py-4 rounded-2xl border-2 border-white/5 bg-white/5 text-slate-400 font-black text-[10px] uppercase tracking-widest transition-all">QR / QRIS</button>
            </div>

            <div id="cash-input-section" class="space-y-6">
                <input type="number" id="cash-received" oninput="calculateChange()" placeholder="RM 0.00" 
                    class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl text-3xl font-black text-center focus:outline-none focus:border-blue-500 text-white">
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="quickCash(10)" class="py-3 glass rounded-xl text-[10px] font-bold uppercase hover:bg-blue-600">RM10</button>
                    <button onclick="quickCash(20)" class="py-3 glass rounded-xl text-[10px] font-bold uppercase hover:bg-blue-600">RM20</button>
                    <button onclick="quickCash(50)" class="py-3 glass rounded-xl text-[10px] font-bold uppercase hover:bg-blue-600">RM50</button>
                    <button onclick="quickCash(100)" class="py-3 glass rounded-xl text-[10px] font-bold uppercase hover:bg-blue-600">RM100</button>
                </div>
                <div class="p-6 bg-emerald-500/10 border border-emerald-500/20 rounded-[2rem] text-center">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Baki Pulangan</p>
                    <h3 id="pay-change" class="text-3xl font-black text-emerald-400">RM 0.00</h3>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="closePayment()" class="py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-500">Batal</button>
                <button onclick="finalizeSale()" id="btn-finalize" class="py-4 bg-blue-600 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-600/30">Sahkan</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = [];
        let grandTotal = 0;
        let currentMethod = 'cash';

        db.collection("inventory").onSnapshot(snap => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const p = { id: doc.id, ...doc.data() };
                const card = document.createElement('div');
                card.className = "product-card btn-press cursor-pointer";
                card.onclick = () => addToCart(p);
                card.innerHTML = `
                    <img src="${p.image || 'https://via.placeholder.com/150'}" class="product-card-img">
                    <h3 class="text-[8px] font-extrabold uppercase truncate w-full mb-1">${p.name}</h3>
                    <p class="text-blue-400 font-black text-[10px]">RM ${parseFloat(p.price).toFixed(2)}</p>
                `;
                grid.appendChild(card);
            });
        });

        function addToCart(p) {
            if(p.stock <= 0) return alert("Stok Habis!");
            const exist = cart.find(i => i.id === p.id);
            if(exist) { if(exist.qty < p.stock) exist.qty++; } 
            else { cart.push({...p, qty: 1}); }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            grandTotal = 0;
            container.innerHTML = '';
            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;
                grandTotal += subtotal;
                container.innerHTML += `
                    <div class="flex items-center justify-between p-3 glass rounded-xl border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black uppercase truncate w-28">${item.name}</span>
                            <span class="text-[10px] text-blue-400 font-bold">${item.qty} x RM ${item.price.toFixed(2)}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[11px] font-black">RM ${subtotal.toFixed(2)}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-500 text-xs"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('totalAmount').innerText = `RM ${grandTotal.toFixed(2)}`;
        }

        function removeFromCart(index) { cart.splice(index, 1); renderCart(); }
        function clearCart() { cart = []; renderCart(); }

        function openPayment() {
            if(cart.length === 0) return;
            document.getElementById('pay-grand-total').innerText = `RM ${grandTotal.toFixed(2)}`;
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closePayment() { document.getElementById('payment-modal').classList.add('hidden'); }

        function setPaymentMethod(method) {
            currentMethod = method;
            document.getElementById('cash-input-section').classList.toggle('hidden', method !== 'cash');
            document.getElementById('btn-cash').className = method === 'cash' ? "py-4 rounded-2xl border-2 border-blue-600 bg-blue-600/10 text-blue-500 font-black text-[10px] uppercase tracking-widest" : "py-4 rounded-2xl border-2 border-white/5 bg-white/5 text-slate-400 font-black text-[10px] uppercase tracking-widest";
            document.getElementById('btn-qr').className = method === 'qr' ? "py-4 rounded-2xl border-2 border-blue-600 bg-blue-600/10 text-blue-500 font-black text-[10px] uppercase tracking-widest" : "py-4 rounded-2xl border-2 border-white/5 bg-white/5 text-slate-400 font-black text-[10px] uppercase tracking-widest";
        }

        function quickCash(amt) { document.getElementById('cash-received').value = amt.toFixed(2); calculateChange(); }

        function calculateChange() {
            const received = parseFloat(document.getElementById('cash-received').value) || 0;
            const baki = received - grandTotal;
            document.getElementById('pay-change').innerText = `RM ${Math.max(0, baki).toFixed(2)}`;
        }

        async function finalizeSale() {
            const received = parseFloat(document.getElementById('cash-received').value) || 0;
            if(currentMethod === 'cash' && received < grandTotal) return alert("Duit tidak cukup!");
            
            const btn = document.getElementById('btn-finalize');
            btn.disabled = true; btn.innerText = "PROSES...";
            
            try {
                const saleRef = db.collection("sales").doc();
                await saleRef.set({
                    items: cart,
                    totalValue: grandTotal,
                    method: currentMethod,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Jualan Berjaya!");
                clearCart(); closePayment();
            } catch(e) { alert("Ralat!"); } finally { btn.disabled = false; btn.innerText = "Sahkan"; }
        }

        document.getElementById('searchItem').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('#productGrid > div').forEach(card => {
                card.style.display = card.querySelector('h3').innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
