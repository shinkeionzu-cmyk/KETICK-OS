<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketick OS | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; }
        .glass-card { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col p-6">

    <div class="mt-8 mb-10">
        <p class="text-blue-500 font-bold tracking-widest text-xs uppercase mb-1">Selamat Datang</p>
        <h1 class="text-3xl font-extrabold tracking-tighter italic">KETICK <span class="text-blue-600">OS</span></h1>
        <p class="text-slate-500 text-sm mt-1">Sistem Pengurusan Bisnes Kasut Digital</p>
    </div>

    <div class="grid grid-cols-1 gap-4">
        
        <a href="pos/index.html" class="btn-main glass-card p-6 rounded-[2rem] flex items-center justify-between group hover:border-blue-500/50 transition-all">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <i class="fas fa-cash-register text-2xl text-white"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg group-hover:text-blue-400 transition-colors">Kaunter Jualan</h2>
                    <p class="text-slate-500 text-xs">Rekod jualan & cetak resit</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-slate-700"></i>
        </a>

        <a href="inventory.html" class="btn-main glass-card p-6 rounded-[2rem] flex items-center justify-between group hover:border-emerald-500/50 transition-all">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-900/40">
                    <i class="fas fa-boxes-stacked text-2xl text-white"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg group-hover:text-emerald-400 transition-colors">Stor & Stok</h2>
                    <p class="text-slate-500 text-xs">Urus produk & baki stok</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-slate-700"></i>
        </a>

        <div class="glass-card p-6 rounded-[2rem] flex items-center justify-between opacity-50">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-slate-700 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-chart-line text-2xl text-white"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg italic">Laporan Untung</h2>
                    <p class="text-slate-500 text-[10px] uppercase tracking-tighter">Akan Datang</p>
                </div>
            </div>
            <i class="fas fa-lock text-slate-700"></i>
        </div>

    </div>

    <div class="mt-auto pt-10">
        <div class="glass-card p-5 rounded-3xl border-dashed border-slate-800">
            <div class="flex justify-between items-center">
                <span class="text-xs text-slate-500 font-bold uppercase tracking-widest">Status Cloud</span>
                <span class="flex items-center gap-2 text-emerald-500 text-[10px] font-bold">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                    BERHUBUNG
                </span>
            </div>
        </div>
    </div>

</body>
</html>
