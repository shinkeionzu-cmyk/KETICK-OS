<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <h1 class="text-xl font-black uppercase mb-6 text-blue-500">Tetapan Sistem</h1>

    <div class="space-y-6 pb-24">
        <div class="glass p-6 rounded-[2rem]">
            <h2 class="text-sm font-bold mb-4 uppercase opacity-50">Profil Bisnes</h2>
            <div class="space-y-4">
                <div class="flex flex-col items-center mb-4">
                    <div id="logo-preview" class="w-20 h-20 glass rounded-2xl flex items-center justify-center mb-2 overflow-hidden">
                        <i class="fas fa-image opacity-20"></i>
                    </div>
                    <input type="file" id="logo-input" class="hidden" accept="image/*" onchange="previewImage(this)">
                    <button onclick="document.getElementById('logo-input').click()" class="text-[10px] font-bold text-blue-400 uppercase">Muat Naik Logo</button>
                </div>
                <input type="text" id="bizName" placeholder="Nama Syarikat" class="w-full p-4 glass rounded-2xl outline-none">
                <input type="tel" id="bizPhone" placeholder="No. Telefon (cth: 6012...)" class="w-full p-4 glass rounded-2xl outline-none">
                <textarea id="bizAddress" placeholder="Alamat Rasmi" class="w-full p-4 glass rounded-2xl outline-none"></textarea>
            </div>
        </div>

        <div class="glass p-6 rounded-[2rem]">
            <h2 class="text-sm font-bold mb-4 uppercase opacity-50">Keselamatan</h2>
            <div class="space-y-4">
                <p class="text-[10px] text-slate-400 italic">PIN sekarang digunakan untuk masuk ke KETICK OS.</p>
                <input type="password" id="newPin" maxlength="4" placeholder="PIN 4 Digit Baru" class="w-full p-4 glass rounded-2xl outline-none text-center text-2xl tracking-[1rem]">
            </div>
        </div>

        <button onclick="saveSettings()" class="w-full py-5 bg-blue-600 rounded-[2rem] font-black uppercase tracking-widest shadow-lg shadow-blue-600/20">Simpan Tetapan</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { /* PASTE CONFIG ANDA */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Data Sedia Ada
        db.collection("settings").doc("profile").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('bizName').value = data.name || "";
                document.getElementById('bizPhone').value = data.phone || "";
                document.getElementById('bizAddress').value = data.address || "";
                document.getElementById('newPin').value = data.pin || "1234";
                if(data.logo) document.getElementById('logo-preview').innerHTML = `<img src="${data.logo}" class="w-full h-full object-cover">`;
            }
        });

        async function saveSettings() {
            const name = document.getElementById('bizName').value;
            const phone = document.getElementById('bizPhone').value;
            const address = document.getElementById('bizAddress').value;
            const pin = document.getElementById('newPin').value;

            await db.collection("settings").doc("profile").set({
                name, phone, address, pin
            }, { merge: true });
            alert("Tetapan Berjaya Disimpan!");
        }

        function previewImage(input) {
            // Nota: Untuk upload logo sebenar ke Storage, kita perlukan Firebase Storage. 
            // Buat masa ni kita simpan data text dulu.
        }
    </script>
</body>
</html>
