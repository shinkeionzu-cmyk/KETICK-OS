<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK OS | Master System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        #security-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #020617; display: flex; align-items: center;
            justify-content: center; backdrop-filter: blur(20px);
        }

        .pin-input {
            width: 50px; height: 60px; text-align: center;
            font-size: 24px; font-weight: bold; border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .v-badge { background: linear-gradient(90deg, #3b82f6, #8b5cf6); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        
        /* Navigasi Bawah untuk Mobile */
        .mobile-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); border-t: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-[#020617] text-slate-900 dark:text-slate-100 transition-all duration-500">

    <div id="security-overlay">
        <div class="max-w-md w-full p-8 rounded-[2.5rem] glass border border-slate-800 text-center">
            <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                <i class="fas fa-shield-alt text-3xl text-blue-500"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Verification</h2>
            <p class="text-slate-400 text-sm mb-8">Masukkan 4 digit PIN.</p>
            <div class="flex justify-center gap-4 mb-8">
                <input type="password" maxlength="1" class="pin-input" autofocus>
                <input type="password" maxlength="1" class="pin-input">
                <input type="password" maxlength="1" class="pin-input">
                <input type="password" maxlength="1" class="pin-input">
            </div>
            <button onclick="verifyAccess()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-600/20">SAHKAN</button>
        </div>
    </div>

    <nav class="hidden lg:flex fixed top-0 left-0 w-72 h-screen glass border-r border-slate-800 flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-bolt text-white"></i></div>
            <h1 class="font-extrabold text-xl">KETICK OS</h1>
        </div>
        <div class="flex-grow space-y-2">
            <button onclick="loadModule('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fas fa-th-large mr-3 text-blue-500"></i> Dashboard</button>
            <button onclick="loadModule('pos')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fas fa-cash-register mr-3 text-emerald-500"></i> Mini POS</button>
            <button onclick="loadModule('stock')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fas fa-boxes mr-3 text-amber-500"></i> Stock</button>
            <button onclick="loadModule('bank')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fas fa-university mr-3 text-blue-400"></i> Bank</button>
            <button onclick="loadModule('accounting')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fas fa-file-invoice-dollar mr-3 text-purple-500"></i> Accounting</button>
        </div>
    </nav>

    <div class="mobile-nav lg:hidden">
        <button onclick="loadModule('dashboard')" class="flex flex-col items-center text-blue-500"><i class="fas fa-home"></i><span class="text-[10px]">Home</span></button>
        <button onclick="loadModule('pos')" class="flex flex-col items-center opacity-60"><i class="fas fa-cash-register"></i><span class="text-[10px]">POS</span></button>
        <button onclick="loadModule('stock')" class="flex flex-col items-center opacity-60"><i class="fas fa-boxes"></i><span class="text-[10px]">Stock</span></button>
        <button onclick="loadModule('bank')" class="flex flex-col items-center opacity-60"><i class="fas fa-university"></i><span class="text-[10px]">Bank</span></button>
        <button onclick="loadModule('accounting')" class="flex flex-col items-center opacity-60"><i class="fas fa-file-invoice-dollar"></i><span class="text-[10px]">Acc</span></button>
    </div>

    <main class="lg:ml-72 min-h-screen pb-20">
        <header class="p-6 lg:p-10 pb-0 flex justify-between items-center">
            <h2 id="moduleTitle" class="text-2xl font-black uppercase">DASHBOARD</h2>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-800 lg:block">🌓</button>
        </header>

        <div class="w-full h-[calc(100vh-150px)] p-4 lg:p-10">
            <iframe id="app-frame" src="about:blank" class="w-full h-full border-none rounded-[2rem] shadow-2xl hidden bg-[#020617]"></iframe>
            
            <div id="dashboard-view" class="block space-y-6">
                <div class="p-6 rounded-3xl glass border-l-4 border-l-blue-600">
                    <p class="text-slate-500 text-sm font-semibold">Status Sistem</p>
                    <h3 class="text-2xl font-bold">Aktif & Selamat</h3>
                </div>
                
                <div onclick="loadModule('pos')" class="p-8 rounded-[2.5rem] bg-gradient-to-br from-blue-600 to-indigo-700 text-white relative overflow-hidden shadow-2xl cursor-pointer">
                    <h2 class="text-2xl font-bold mb-1">Mula Jualan</h2>
                    <p class="opacity-80 text-xs">Klik untuk buka Mini POS</p>
                    <i class="fas fa-cash-register absolute right-[-10px] bottom-[-10px] text-7xl opacity-10"></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SECURITY_CONFIG = { PIN: "1234", ALLOWED_DEVICE_ID: "KETICK-DEVICE-99" };

        function verifyAccess() {
            let enteredPin = "";
            document.querySelectorAll('.pin-input').forEach(i => enteredPin += i.value);
            if (enteredPin === SECURITY_CONFIG.PIN) {
                document.getElementById('security-overlay').style.display = 'none';
            } else {
                alert("PIN Salah!");
                document.querySelectorAll('.pin-input').forEach(i => i.value = "");
            }
        }

        function loadModule(name) {
            const frame = document.getElementById('app-frame');
            const dashboard = document.getElementById('dashboard-view');
            const title = document.getElementById('moduleTitle');

            title.innerText = name.toUpperCase();

            if (name === 'dashboard') {
                frame.classList.add('hidden');
                dashboard.classList.remove('hidden');
            } else {
                // Sila pastikan anda ada folder /pos/index.html , /stock/index.html , dll.
                frame.src = `./${name}/index.html`; 
                frame.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        }

        // Auto focus input PIN
        const inputs = document.querySelectorAll('.pin-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => { if (input.value && index < 3) inputs[index+1].focus(); });
        });
    </script>
</body>
</html>
