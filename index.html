<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETICK OS | ERP System</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* MOBILE NAVIGATION */
        .mobile-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            height: 75px; background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 100; padding-bottom: env(safe-area-inset-bottom);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CLASS UNTUK SEMBUNYI NAV */
        .nav-hidden { transform: translateY(100%); }

        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; background: none; border: none; outline: none !important; transition: all 0.3s; cursor: pointer; }
        .nav-btn i { font-size: 1.2rem; pointer-events: none; }
        .nav-btn span { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; pointer-events: none; }
        .nav-btn.active { color: #3b82f6; transform: translateY(-2px); }

        /* SECURITY OVERLAY */
        #security-overlay { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; align-items: center; justify-content: center; }
        .pin-input { width: 55px; height: 65px; text-align: center; font-size: 24px; font-weight: 800; border-radius: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* APP FRAME OPTIMIZATION */
        #app-frame { 
            border: none; width: 100%; height: 100%; 
            background: #020617;
            transition: all 0.4s ease;
        }

        /* Apabila nav disorok, iframe akan ke bawah skrin */
        main.full-screen #app-frame { padding-bottom: 0; }
        main:not(.full-screen) #app-frame { padding-bottom: 75px; }
    </style>
</head>
<body>

    <div id="security-overlay">
        <div class="max-w-xs w-full p-8 rounded-[3rem] glass text-center border border-white/10">
            <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                <i class="fas fa-fingerprint text-2xl text-blue-500"></i>
            </div>
            <h2 class="text-xl font-extrabold mb-2 uppercase tracking-tighter text-white">KETICK ACCESS</h2>
            <div class="flex justify-center gap-3 mb-8">
                <input type="password" inputmode="numeric" maxlength="1" class="pin-input" autofocus>
                <input type="password" inputmode="numeric" maxlength="1" class="pin-input">
                <input type="password" inputmode="numeric" maxlength="1" class="pin-input">
                <input type="password" inputmode="numeric" maxlength="1" class="pin-input">
            </div>
            <button onclick="verifyAccess()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase tracking-[0.2em] text-[10px]">Verify Identity</button>
        </div>
    </div>

    <nav class="hidden lg:flex fixed top-0 left-0 w-72 h-screen glass border-r border-white/5 flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center font-black">K</div>
            <h1 class="font-extrabold text-xl tracking-tighter italic">KETICK<span class="text-blue-500">OS</span></h1>
        </div>
        <div class="flex-grow overflow-y-auto no-scrollbar space-y-1">
            <button onclick="loadModule('dashboard')" class="w-full text-left p-3.5 rounded-xl hover:bg-white/5 text-sm flex items-center gap-3"><i class="fas fa-home text-blue-500"></i> Dashboard</button>
            <button onclick="loadModule('pos')" class="w-full text-left p-3.5 rounded-xl hover:bg-white/5 text-sm flex items-center gap-3"><i class="fas fa-cash-register text-emerald-500"></i> Mini POS</button>
            <button onclick="loadModule('sales')" class="w-full text-left p-3.5 rounded-xl hover:bg-white/5 text-sm flex items-center gap-3"><i class="fas fa-shopping-cart text-indigo-500"></i> Sales Mgmt</button>
        </div>
    </nav>

    <div class="mobile-nav lg:hidden">
        <button onclick="loadModule('dashboard')" class="nav-btn active"><i class="fas fa-th-large"></i><span>Home</span></button>
        <button onclick="loadModule('pos')" class="nav-btn"><i class="fas fa-cash-register"></i><span>POS</span></button>
        <button onclick="loadModule('sales')" class="nav-btn"><i class="fas fa-shopping-cart"></i><span>Sales</span></button>
        <button onclick="toggleMoreMenu()" class="nav-btn"><i class="fas fa-ellipsis-h"></i><span>More</span></button>
    </div>

    <main id="main-container" class="lg:ml-72 h-screen flex flex-col">
        <header class="p-6 flex justify-between items-center z-[110]">
            <div class="flex items-center gap-4">
                <button id="backBtn" onclick="closeModule()" class="hidden w-10 h-10 glass rounded-full flex items-center justify-center text-white active:scale-90 transition-transform">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div>
                    <h2 id="moduleTitle" class="text-xl font-black uppercase tracking-tighter text-blue-500">DASHBOARD</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">System Online</span>
                    </div>
                </div>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff" class="w-10 h-10 rounded-2xl border border-white/10 shadow-lg">
        </header>

        <div class="flex-grow relative overflow-hidden">
            <iframe id="app-frame" class="hidden absolute inset-0 w-full h-full"></iframe>
            
            <div id="dashboard-view" class="p-4 space-y-4 overflow-y-auto h-full pb-32 no-scrollbar">
                <div class="p-8 rounded-[3rem] bg-gradient-to-br from-blue-600 to-indigo-800 shadow-2xl relative overflow-hidden group" onclick="loadModule('pos')">
                    <h2 class="text-3xl font-black leading-tight">Mula<br>Jualan</h2>
                    <p class="opacity-70 text-xs font-bold uppercase mt-2">Terminal POS Aktif</p>
                    <i class="fas fa-bolt absolute right-[-20px] bottom-[-20px] text-[10rem] opacity-10"></i>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 glass rounded-[2.5rem]"><p class="text-[10px] font-bold text-slate-500 uppercase">Stok</p><h4 id="dash-total-stock" class="text-xl font-black mt-1">...</h4></div>
                    <div class="p-6 glass rounded-[2.5rem]"><p class="text-[10px] font-bold text-slate-500 uppercase">Jualan</p><h4 id="dash-today-sales" class="text-xl font-black mt-1 text-emerald-400">RM 0.00</h4></div>
                </div>
            </div>
        </div>
    </main>

    <div id="more-menu" class="fixed inset-0 bg-[#020617]/95 z-[150] hidden p-10 backdrop-blur-2xl overflow-y-auto">
        <div class="grid grid-cols-3 gap-y-10 gap-x-6 pt-24 text-center">
            <div onclick="loadModule('bank')" class="flex flex-col items-center gap-2"><div class="w-14 h-14 glass rounded-3xl flex items-center justify-center text-blue-400"><i class="fas fa-university"></i></div><span class="text-[9px] font-bold uppercase">Bank</span></div>
            <div onclick="loadModule('setting')" class="flex flex-col items-center gap-2"><div class="w-14 h-14 glass rounded-3xl flex items-center justify-center text-slate-400"><i class="fas fa-cog"></i></div><span class="text-[9px] font-bold uppercase">Setting</span></div>
            <div onclick="toggleMoreMenu()" class="col-span-3 mt-10 flex justify-center"><button class="w-16 h-16 bg-red-500/20 border border-red-500/50 rounded-full text-red-500 flex items-center justify-center"><i class="fas fa-times"></i></button></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
          authDomain: "ketick-os.firebaseapp.com",
          projectId: "ketick-os",
          storageBucket: "ketick-os.firebasestorage.app",
          messagingSenderId: "407192673747",
          appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. LOGIK SEMBUNYI NAV BERDASARKAN MESEJ DARI IFRAME
        window.addEventListener('message', function(event) {
            const mobileNav = document.querySelector('.mobile-nav');
            const mainCont = document.getElementById('main-container');
            if (event.data === 'hideNav') {
                mobileNav.classList.add('nav-hidden');
                mainCont.classList.add('full-screen');
            } else if (event.data === 'showNav') {
                mobileNav.classList.remove('nav-hidden');
                mainCont.classList.remove('full-screen');
            }
        });

        // 2. FUNGSI UNTUK TUTUP MODUL & KEMBALI KE HOME
        function closeModule() {
            loadModule('dashboard');
        }

        function loadModule(name) {
            const frame = document.getElementById('app-frame');
            const dash = document.getElementById('dashboard-view');
            const backBtn = document.getElementById('backBtn');
            const mobileNav = document.querySelector('.mobile-nav');
            const mainCont = document.getElementById('main-container');

            document.getElementById('moduleTitle').innerText = name.replace('-', ' ').toUpperCase();
            document.getElementById('more-menu').classList.add('hidden');
            
            // Default: Tunjuk balik nav & buang status full-screen
            mobileNav.classList.remove('nav-hidden');
            mainCont.classList.remove('full-screen');

            if (name === 'dashboard') {
                frame.classList.add('hidden');
                dash.classList.remove('hidden');
                backBtn.classList.add('hidden');
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.mobile-nav .nav-btn:first-child').classList.add('active');
            } else {
                frame.src = `./${name}/index.html`;
                frame.classList.remove('hidden');
                dash.classList.add('hidden');
                backBtn.classList.remove('hidden'); // Tunjuk butang undur
            }
        }

        // LOGIK SECURITY (TIDAK DIUSIK)
        async function verifyAccess() {
            let pin = "";
            document.querySelectorAll('.pin-input').forEach(i => pin += i.value);
            if(pin === "1234") { 
                document.getElementById('security-overlay').style.display = 'none'; 
                startSync(); 
            } else {
                alert("PIN SALAH!");
                document.querySelectorAll('.pin-input').forEach(i => i.value = "");
            }
        }

        function startSync() {
            const today = new Date().toISOString().split('T')[0];
            db.collection("sales").where("date", "==", today).onSnapshot(snap => {
                let total = 0;
                snap.forEach(doc => total += (parseFloat(doc.data().totalPrice) || 0));
                document.getElementById('dash-today-sales').innerText = `RM ${total.toFixed(2)}`;
            });
        }

        function toggleMoreMenu() { document.getElementById('more-menu').classList.toggle('hidden'); }

        const inputs = document.querySelectorAll('.pin-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => { if (input.value && index < 3) inputs[index+1].focus(); if(index === 3 && input.value) verifyAccess(); });
            input.addEventListener('keydown', (e) => { if (e.key === "Backspace" && !input.value && index > 0) inputs[index-1].focus(); });
        });
    </script>
</body>
</html>
