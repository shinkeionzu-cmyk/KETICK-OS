<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETICK POS | Standalone Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-press:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Layout Grid Utama */
        .terminal-layout {
            display: grid;
            grid-template-columns: 1fr;
            height: 100vh;
        }
        @media (min-width: 1024px) {
            .terminal-layout { grid-template-columns: 1fr 450px; }
        }

        .category-pill.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
</head>
<body>

    <div class="terminal-layout">
        <section class="flex flex-col h-full overflow-hidden">
            <header class="p-4 glass flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <button onclick="window.location.href='../index.html'" class="w-10 h-10 rounded-xl glass flex items-center justify-center text-slate-400 hover:text-white">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div>
                        <h1 class="font-black text-xl tracking-tighter">KETICK <span class="text-blue-500">POS</span></h1>
                        <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Standalone Terminal v2.0</p>
                    </div>
                </div>
                
                <div class="relative flex-grow max-w-md">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="searchBox" placeholder="Imbas kod atau cari nama produk..." 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-12 pr-4 text-sm focus:outline-none focus:border-blue-500 transition-all">
                </div>
            </header>

            <div class="p-4 flex gap-2 overflow-x-auto no-scrollbar border-b border-white/5 bg-slate-900/20">
                <button class="category-pill active px-6 py-2 rounded-full border border-white/10 text-xs font-bold whitespace-nowrap">SEMUA</button>
                <button class="category-pill px-6 py-2 rounded-full border border-white/10 text-xs font-bold whitespace-nowrap text-slate-400">MAKANAN</button>
                <button class="category-pill px-6 py-2 rounded-full border border-white/10 text-xs font-bold whitespace-nowrap text-slate-400">MINUMAN</button>
                <button class="category-pill px-6 py-2 rounded-full border border-white/10 text-xs font-bold whitespace-nowrap text-slate-400">SERVIS</button>
            </div>

            <div id="productGrid" class="flex-grow overflow-y-auto p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4 no-scrollbar">
                <div class="col-span-full py-20 text-center opacity-50">Memuatkan Katalog...</div>
            </div>
        </section>

        <section class="flex flex-col h-full bg-[#0a0f1d] border-l border-white/10">
            <div class="p-6 border-b border-white/5 flex justify-between items-end">
                <div>
                    <h2 class="font-black text-lg tracking-tight">SENARAI PESANAN</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Meja / No. Resit: <span id="receiptNo" class="text-blue-500">...</span></p>
                </div>
                <button onclick="clearCart()" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg transition">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>

            <div id="cartContainer" class="flex-grow overflow-y-auto p-6 space-y-4 no-scrollbar">
                <div id="emptyCart" class="text-center py-20 opacity-20">
                    <i class="fas fa-shopping-cart text-6xl mb-4"></i>
                    <p class="text-sm font-bold uppercase tracking-widest">Tiada Item</p>
                </div>
            </div>

            <div class="p-8 glass rounded-t-[3rem] border-t border-white/10">
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400 italic">Subtotal</span>
                        <span id="subtotal" class="font-bold">RM 0.00</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400 italic">Cukai (0%)</span>
                        <span class="font-bold">RM 0.00</span>
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-white/10">
                        <span class="text-lg font-black tracking-tighter">JUMLAH</span>
                        <span id="totalAmount" class="text-3xl font-black text-emerald-400 tracking-tighter">RM 0.00</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest btn-press">Simpan Bil</button>
                    <button onclick="checkout()" class="bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-blue-600/20 btn-press">Bayar Sekarang</button>
                </div>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = [];
        document.getElementById('receiptNo').innerText = 'POS-' + Math.floor(Math.random() * 9000 + 1000);

        // Load Produk
        function initPOS() {
            db.collection("inventory").onSnapshot(snap => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const p = { id: doc.id, ...doc.data() };
                    const card = document.createElement('div');
                    card.className = "glass p-4 rounded-3xl cursor-pointer hover:border-blue-500/50 transition-all btn-press group relative overflow-hidden";
                    card.onclick = () => addToCart(p);
                    card.innerHTML = `
                        <div class="w-full aspect-square rounded-2xl bg-white/5 mb-3 overflow-hidden">
                            <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-[11px] font-black uppercase truncate leading-tight">${p.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-blue-400 font-black text-xs">RM ${parseFloat(p.price).toFixed(2)}</span>
                            <span class="text-[9px] font-bold px-2 py-0.5 bg-white/5 rounded-md">${p.stock}</span>
                        </div>
                        <div class="absolute inset-0 bg-blue-600 opacity-0 group-hover:opacity-10 transition-opacity"></div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function addToCart(p) {
            if(p.stock <= 0) return alert("Tiada stok!");
            const exist = cart.find(i => i.id === p.id);
            if(exist) {
                if(exist.qty < p.stock) exist.qty++;
            } else {
                cart.push({...p, qty: 1});
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartContainer');
            const empty = document.getElementById('emptyCart');
            container.innerHTML = '';
            
            if(cart.length === 0) {
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                let subtotal = 0;
                cart.forEach(item => {
                    subtotal += (item.price * item.qty);
                    container.innerHTML += `
                        <div class="flex items-center gap-4 p-4 glass rounded-2xl">
                            <div class="w-12 h-12 rounded-xl overflow-hidden bg-white/5">
                                <img src="${item.image}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-grow">
                                <h4 class="text-[10px] font-black uppercase">${item.name}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <button onclick="updateQty('${item.id}', -1)" class="w-6 h-6 rounded-md bg-white/5 flex items-center justify-center text-[10px]">-</button>
                                    <span class="text-xs font-black w-5 text-center">${item.qty}</span>
                                    <button onclick="updateQty('${item.id}', 1)" class="w-6 h-6 rounded-md bg-white/5 flex items-center justify-center text-[10px]">+</button>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black">RM ${(item.price * item.qty).toFixed(2)}</p>
                                <button onclick="removeFromCart('${item.id}')" class="text-[9px] text-red-500 font-bold uppercase mt-1">Buang</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('subtotal').innerText = `RM ${subtotal.toFixed(2)}`;
                document.getElementById('totalAmount').innerText = `RM ${subtotal.toFixed(2)}`;
            }
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty += change;
                if(item.qty <= 0) removeFromCart(id);
                if(item.qty > item.stock) {
                    alert("Had stok!");
                    item.qty = item.stock;
                }
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function clearCart() { cart = []; renderCart(); }

        async function checkout() {
            if(cart.length === 0) return;
            const batch = db.batch();
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            try {
                // Rekod Sales
                const saleRef = db.collection("sales").doc();
                batch.set(saleRef, {
                    items: cart,
                    totalValue: total,
                    date: new Date().toISOString().split('T')[0],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Update Stok
                cart.forEach(item => {
                    const invRef = db.collection("inventory").doc(item.id);
                    batch.update(invRef, {
                        stock: firebase.firestore.FieldValue.increment(-item.qty)
                    });
                });

                await batch.commit();
                alert("Penyelesaian Jualan Berjaya!");
                clearCart();
            } catch(e) { alert("Ralat database!"); }
        }

        initPOS();
    </script>
</body>
</html>
