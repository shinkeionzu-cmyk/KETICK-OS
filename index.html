<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK OS | Master System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #security-overlay { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .pin-input { width: 50px; height: 60px; text-align: center; font-size: 24px; font-weight: bold; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-t: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; transition: all 0.3s; background: none; border: none; flex: 1; }
        .nav-btn i { font-size: 1.2rem; }
        .nav-btn span { font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .nav-btn.active { color: #3b82f6; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100">

    <div id="security-overlay">
        <div class="max-w-md w-full p-8 rounded-[2.5rem] glass border border-slate-800 text-center">
            <div class="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                <i class="fas fa-shield-alt text-2xl text-blue-500"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">Verification</h2>
            <div class="flex justify-center gap-3 mb-8">
                <input type="password" maxlength="1" class="pin-input" autofocus>
                <input type="password" maxlength="1" class="pin-input">
                <input type="password" maxlength="1" class="pin-input">
                <input type="password" maxlength="1" class="pin-input">
            </div>
            <button onclick="verifyAccess()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">SAHKAN</button>
        </div>
    </div>

    <nav class="hidden lg:flex fixed top-0 left-0 w-72 h-screen glass border-r border-slate-800 flex-col p-6 z-50">
        <h1 class="font-extrabold text-xl mb-10 text-blue-500">KETICK OS</h1>
        <div class="flex-grow space-y-2">
            <button onclick="loadModule('dashboard')" class="w-full text-left p-4 rounded-xl hover:bg-white/5"><i class="fas fa-home mr-3"></i> Dashboard</button>
            <button onclick="loadModule('pos')" class="w-full text-left p-4 rounded-xl hover:bg-white/5"><i class="fas fa-cash-register mr-3"></i> Mini POS</button>
            <button onclick="loadModule('stock')" class="w-full text-left p-4 rounded-xl hover:bg-white/5"><i class="fas fa-boxes mr-3"></i> Stock</button>
            <button onclick="loadModule('bank')" class="w-full text-left p-4 rounded-xl hover:bg-white/5"><i class="fas fa-university mr-3"></i> Bank</button>
            <button onclick="loadModule('accounting')" class="w-full text-left p-4 rounded-xl hover:bg-white/5"><i class="fas fa-file-invoice-dollar mr-3"></i> Accounting</button>
            <button onclick="loadModule('report')" class="w-full text-left p-4 rounded-xl hover:bg-white/5"><i class="fas fa-chart-line mr-3"></i> Report</button>
        </div>
    </nav>

    <div class="mobile-nav lg:hidden">
        <button onclick="loadModule('dashboard')" class="nav-btn active"><i class="fas fa-home"></i><span>Home</span></button>
        <button onclick="loadModule('pos')" class="nav-btn"><i class="fas fa-cash-register"></i><span>POS</span></button>
        <button onclick="loadModule('stock')" class="nav-btn"><i class="fas fa-boxes"></i><span>Stock</span></button>
        <button onclick="loadModule('bank')" class="nav-btn"><i class="fas fa-university"></i><span>Bank</span></button>
        <button onclick="loadModule('accounting')" class="nav-btn"><i class="fas fa-receipt"></i><span>Acc</span></button>
        <button onclick="loadModule('report')" class="nav-btn"><i class="fas fa-chart-bar"></i><span>Rep</span></button>
    </div>

    <main class="lg:ml-72 min-h-screen pb-24">
        <header class="p-6 lg:p-10 flex justify-between items-center">
            <h2 id="moduleTitle" class="text-xl font-black uppercase tracking-tighter">DASHBOARD</h2>
            <div class="w-8 h-8 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center">
                <i class="fas fa-user text-[10px] text-blue-500"></i>
            </div>
        </header>

        <div class="w-full h-[calc(100vh-160px)] px-4 lg:px-10">
            <iframe id="app-frame" src="about:blank" class="w-full h-full border-none rounded-[2.5rem] hidden"></iframe>
            <div id="dashboard-view" class="block space-y-4">
                <div class="p-6 rounded-3xl glass border-l-4 border-l-blue-500">
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Sistem Status</p>
                    <h3 class="text-lg font-bold">KETICK OS AKTIF</h3>
                </div>
                <div onclick="loadModule('pos')" class="p-8 rounded-[2.5rem] bg-gradient-to-br from-blue-600 to-indigo-700 shadow-xl">
                    <h2 class="text-xl font-bold">Mula Jualan</h2>
                    <p class="opacity-70 text-xs">Akses Mini POS Sekarang</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function verifyAccess() {
            let pin = "";
            document.querySelectorAll('.pin-input').forEach(i => pin += i.value);
            if (pin === "1234") document.getElementById('security-overlay').style.display = 'none';
            else { alert("PIN SALAH"); document.querySelectorAll('.pin-input').forEach(i => i.value = ""); }
        }

        function loadModule(name) {
            const frame = document.getElementById('app-frame');
            const dash = document.getElementById('dashboard-view');
            document.getElementById('moduleTitle').innerText = name;
            
            // Urus UI Butang Aktif
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (name === 'dashboard') {
                frame.classList.add('hidden');
                dash.classList.remove('hidden');
            } else {
                frame.src = `./${name}/index.html`;
                frame.classList.remove('hidden');
                dash.classList.add('hidden');
            }
        }

        const inputs = document.querySelectorAll('.pin-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => { if (input.value && index < 3) inputs[index+1].focus(); });
        });
    </script>
</body>
</html>
