<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen p-4 pb-32 lg:pb-4">

    <div class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='../index.html'" class="p-3 rounded-xl glass hover:bg-slate-800">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-bold">Mini POS <span class="text-blue-500 text-xs">V1.0</span></h1>
        <div class="p-3 rounded-xl glass text-emerald-500">
            <i class="fas fa-circle text-[10px] animate-pulse"></i> Live
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2">
            <div class="mb-4 relative">
                <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
                <input type="text" placeholder="Cari produk atau scan barcode..." class="w-full p-4 pl-12 rounded-2xl glass border-none focus:ring-2 focus:ring-blue-600 outline-none">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="product-grid">
                </div>
        </div>

        <div class="lg:col-span-1">
            <div class="rounded-3xl glass p-6 sticky top-4 border border-blue-500/20 shadow-2xl shadow-blue-900/10">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-shopping-cart text-blue-500"></i> Senarai Jualan
                </h2>
                
                <div id="cart-items" class="space-y-4 max-h-[40vh] overflow-y-auto mb-6 pr-2">
                    <p class="text-slate-500 text-center py-10 text-sm italic">Bakul kosong...</p>
                </div>

                <div class="space-y-2 border-t border-slate-800 pt-4">
                    <div class="flex justify-between text-sm text-slate-400">
                        <span>Subtotal</span>
                        <span id="subtotal">RM 0.00</span>
                    </div>
                    <div class="flex justify-between text-sm text-slate-400">
                        <span>Cukai (0%)</span>
                        <span>RM 0.00</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-white pt-2">
                        <span>TOTAL</span>
                        <span id="grand-total" class="text-blue-500">RM 0.00</span>
                    </div>
                </div>

                <button onclick="processPayment()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-blue-600/30 transition-all active:scale-95">
                    BAYAR SEKARANG
                </button>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="bg-white text-black w-full max-w-sm p-8 rounded-none shadow-2xl font-mono relative">
            <div class="text-center border-b border-dashed border-gray-300 pb-4 mb-4">
                <h2 class="font-bold text-xl uppercase">KETICK OS</h2>
                <p class="text-[10px]">Digital Shoes & Services</p>
                <p class="text-[10px]" id="receipt-date"></p>
            </div>
            <div id="receipt-content" class="text-xs space-y-2 mb-4"></div>
            <div class="border-t border-dashed border-gray-300 pt-4 text-right">
                <p class="font-bold">TOTAL: <span id="receipt-total"></span></p>
            </div>
            <button onclick="closeReceipt()" class="w-full mt-6 bg-black text-white py-2 text-xs uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <script>
        // Data Produk Dummy
        const products = [
            { id: 1, name: "Sneakers Pro", price: 150.00, icon: "👟" },
            { id: 2, name: "Formal Leather", price: 280.00, icon: "👞" },
            { id: 3, name: "Sport Socks", price: 15.00, icon: "🧦" },
            { id: 4, name: "Shoe Cleaner", price: 45.00, icon: "🧼" },
            { id: 5, name: "Digital Voucher", price: 50.00, icon: "🎫" }
        ];

        let cart = [];

        // Render Produk ke Grid
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="addToCart(${p.id})" class="product-card p-6 rounded-3xl glass hover:bg-blue-600/10 cursor-pointer transition-all border border-slate-800">
                    <div class="text-4xl mb-3">${p.icon}</div>
                    <h3 class="font-bold text-sm">${p.name}</h3>
                    <p class="text-blue-500 font-bold">RM ${p.price.toFixed(2)}</p>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            
            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateUI();
        }

        function updateUI() {
            const cartDiv = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartDiv.innerHTML = `<p class="text-slate-500 text-center py-10 text-sm italic">Bakul kosong...</p>`;
            } else {
                cartDiv.innerHTML = cart.map(item => `
                    <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl">
                        <div>
                            <p class="font-bold text-sm">${item.name}</p>
                            <p class="text-xs text-slate-500">RM ${item.price.toFixed(2)} x ${item.qty}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold">RM ${(item.price * item.qty).toFixed(2)}</span>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('subtotal').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('grand-total').innerText = `RM ${total.toFixed(2)}`;
        }

        function processPayment() {
            if (cart.length === 0) return alert("Bakul masih kosong!");
            
            // Generate Resit
            const date = new Date().toLocaleString();
            document.getElementById('receipt-date').innerText = date;
            document.getElementById('receipt-total').innerText = document.getElementById('grand-total').innerText;
            
            const receiptContent = cart.map(item => `
                <div class="flex justify-between italic">
                    <span>${item.name} x${item.qty}</span>
                    <span>${(item.price * item.qty).toFixed(2)}</span>
                </div>
            `).join('');
            
            document.getElementById('receipt-content').innerHTML = receiptContent;
            document.getElementById('receipt-modal').style.display = 'flex';
        }

        function closeReceipt() {
            cart = [];
            updateUI();
            document.getElementById('receipt-modal').style.display = 'none';
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
