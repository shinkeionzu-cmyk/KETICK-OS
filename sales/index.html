<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Management | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="mb-8">
        <h1 class="text-2xl font-extrabold tracking-tight">Rekod Jualan</h1>
        <p class="text-slate-500 text-sm italic">Pantau aliran tunai dan sejarah transaksi harian.</p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="glass p-5 rounded-[2rem] border-l-4 border-emerald-500">
            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Jualan Dipilih</p>
            <h3 class="text-2xl font-black text-emerald-400" id="filter-total">RM 0.00</h3>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Bil. Transaksi</p>
            <h3 class="text-2xl font-black text-blue-500" id="filter-count">0</h3>
        </div>
    </div>

    <div class="flex flex-wrap gap-3 mb-6">
        <button id="btn-today" onclick="fetchSales('today')" class="bg-blue-600 px-5 py-2 rounded-xl text-xs font-bold transition">Hari Ini</button>
        <button id="btn-yesterday" onclick="fetchSales('yesterday')" class="glass hover:bg-white/10 px-5 py-2 rounded-xl text-xs font-bold transition">Semalam</button>
        <button id="btn-all" onclick="fetchSales('all')" class="glass hover:bg-white/10 px-5 py-2 rounded-xl text-xs font-bold transition">Semua</button>
    </div>

    <div class="overflow-x-auto rounded-3xl glass border border-slate-800">
        <table class="w-full text-left border-collapse">
            <thead class="bg-white/5 text-slate-400 text-[10px] uppercase tracking-widest">
                <tr>
                    <th class="p-5">Masa/ID</th>
                    <th class="p-5">Butiran Item</th>
                    <th class="p-5">Kaedah</th>
                    <th class="p-5 text-right">Jumlah (RM)</th>
                </tr>
            </thead>
            <tbody id="sales-table-body" class="text-sm divide-y divide-slate-800">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.fetchSales = (period) => {
            const tbody = document.getElementById('sales-table-body');
            let q = db.collection("sales");
            
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            // Filter hiasan butang
            document.querySelectorAll('button[id^="btn-"]').forEach(b => {
                b.classList.remove('bg-blue-600');
                b.classList.add('glass');
            });
            document.getElementById('btn-' + period).classList.add('bg-blue-600');
            document.getElementById('btn-' + period).classList.remove('glass');

            if (period === 'today') {
                q = q.where("date", "==", todayStr);
            } else if (period === 'yesterday') {
                const yesterday = new Date(now);
                yesterday.setDate(now.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];
                q = q.where("date", "==", yesterdayStr);
            }

            // Susun mengikut masa terbaru
            q.orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                let totalRM = 0;
                let count = 0;
                
                if(snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-600 font-bold uppercase tracking-widest text-xs">Tiada Rekod Jualan</td></tr>`;
                    document.getElementById('filter-total').innerText = "RM 0.00";
                    document.getElementById('filter-count').innerText = "0";
                    return;
                }

                tbody.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    const val = parseFloat(data.totalPrice || 0);
                    totalRM += val;
                    count++;
                    
                    return `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-5">
                                <div class="font-bold text-slate-200">${data.time || '00:00'}</div>
                                <div class="text-[10px] text-slate-500 italic">...${doc.id.slice(-5)}</div>
                            </td>
                            <td class="p-5 text-slate-400">
                                <div class="truncate max-w-[200px]">
                                    ${data.items ? data.items.map(i => i.name).join(', ') : 'Produk'}
                                </div>
                            </td>
                            <td class="p-5">
                                <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter border border-blue-500/20">
                                    ${data.method || 'Tunai'}
                                </span>
                            </td>
                            <td class="p-5 text-right font-black text-emerald-400">
                                ${val.toFixed(2)}
                            </td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('filter-total').innerText = `RM ${totalRM.toFixed(2)}`;
                document.getElementById('filter-count').innerText = count;
            });
        };

        // Mulakan dengan data hari ini
        fetchSales('today');
    </script>
</body>
</html>
