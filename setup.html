<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Database | KETICK OS</title>
</head>
<body style="background:#020617; color:white; font-family:sans-serif; padding:40px; text-align:center;">
    <div style="max-width:400px; margin:auto; background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; border:1px solid rgba(255,255,255,0.1);">
        <h2>Ketick OS Setup</h2>
        <p id="status" style="color:#94a3b8;">Sila tekan butang di bawah untuk masukkan data stok awal ke Cloud...</p>
        <button onclick="runSetup()" style="width:100%; padding:15px; background:#2563eb; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:20px;">MASUKKAN DATA STOK</button>
    </div>

    <script type="module">
        // Import menggunakan absolute path
        import { db, collection, addDoc } from "/firebase-config.js";

        window.runSetup = async function() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Sedang menghantar data ke Firebase...";

            const initialStock = [
                { name: "Sneakers Pro", category: "Kasut", stock: 50, price: 150.00, min: 5 },
                { name: "Formal Leather", category: "Kasut", stock: 20, price: 280.00, min: 3 },
                { name: "Sport Socks", category: "Aksesori", stock: 100, price: 15.00, min: 10 },
                { name: "Shoe Cleaner", category: "Aksesori", stock: 30, price: 45.00, min: 5 }
            ];

            try {
                for (let item of initialStock) {
                    await addDoc(collection(db, "inventory"), item);
                }
                status.innerHTML = "<b style='color:#10b981;'>✅ BERJAYA!</b><br><br>Data dah masuk Firestore. Awak boleh buka folder /pos sekarang.";
            } catch (e) {
                status.innerHTML = "<b style='color:#ef4444;'>❌ GAGAL:</b><br>" + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
