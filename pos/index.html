<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen p-4 pb-20">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold italic">KETICK <span class="text-blue-500">POS</span></h1>
        <div class="px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-500 text-[10px] font-bold">
            ONLINE
        </div>
    </div>

    <div id="product-grid" class="grid grid-cols-2 gap-4 mb-8">
        <p class="text-slate-500 col-span-2 text-center py-10">Memuatkan produk...</p>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-[#0f172a]/80 backdrop-blur-lg border-t border-slate-800">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Total Bayaran</p>
                <p id="grand-total" class="text-xl font-bold text-blue-500">RM 0.00</p>
            </div>
            <button onclick="processPayment()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all">
                BAYAR
            </button>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, updateDoc, doc, onSnapshot } from "/KETICK-OS/firebase-config.js";

        let products = [];
        let cart = [];

        // Ambil Data
        onSnapshot(collection(db, "inventory"), (snapshot) => {
            products = [];
            snapshot.forEach((doc) => products.push({ id: doc.id, ...doc.data() }));
            render();
        });

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="addToCart('${p.id}')" class="bg-[#0f172a] p-4 rounded-3xl border border-slate-800 active:border-blue-500 transition-all">
                    <div class="text-3xl mb-2">${p.category === 'Kasut' ? '👟' : '🧼'}</div>
                    <h3 class="text-sm font-bold truncate">${p.name}</h3>
                    <p class="text-blue-500 font-bold text-sm">RM ${p.price.toFixed(2)}</p>
                    <p class="text-[9px] text-slate-500 mt-1">Stok: ${p.stock}</p>
                </div>
            `).join('');
        }

        window.addToCart = (id) => {
            const p = products.find(x => x.id === id);
            if (p.stock <= 0) return alert("Habis stok!");
            cart.push(p);
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('grand-total').innerText = `RM ${total.toFixed(2)}`;
        };

        window.processPayment = async () => {
            if (cart.length === 0) return alert("Bakul kosong!");
            try {
                const total = cart.reduce((s, i) => s + i.price, 0);
                await addDoc(collection(db, "sales"), { items: cart.length, total: total, date: new Date() });
                alert("Jualan Berjaya! Resit dicetak (Digital)");
                cart = [];
                document.getElementById('grand-total').innerText = "RM 0.00";
            } catch (e) { alert("Ralat: " + e.message); }
        };
    </script>
</body>
</html>
