<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK POS | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card:active { transform: scale(0.96); background: rgba(59, 130, 246, 0.1); }
        .method-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        #payment-modal { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        #payment-modal.show { transform: translateY(0); }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-blue-500 font-black tracking-tighter italic text-xl">KETICK <span class="text-white">POS</span></h1>
            <p id="item-count" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">0 Item Dipilih</p>
        </div>
        <button onclick="clearCart()" class="text-[10px] font-bold text-red-400 uppercase tracking-widest border border-red-500/20 px-3 py-2 rounded-xl">Reset</button>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-4">
        </div>

    <div id="checkout-bar" class="fixed bottom-6 left-4 right-4 glass p-5 rounded-[2.5rem] flex justify-between items-center shadow-2xl border-blue-500/20 hidden">
        <div>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total</p>
            <h3 id="total-price" class="text-xl font-black text-emerald-400 tracking-tighter">RM 0.00</h3>
        </div>
        <button onclick="openPayment()" class="bg-blue-600 text-white font-black px-8 py-4 rounded-2xl text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-blue-600/30">Bayar Now</button>
    </div>

    <div id="payment-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden" onclick="closePayment()"></div>
    <div id="payment-modal" class="fixed bottom-0 left-0 right-0 glass rounded-t-[3rem] z-[110] p-8 border-t border-white/10">
        <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
        
        <h2 class="text-center font-black text-xl mb-2 tracking-tighter">PEMBAYARAN</h2>
        <p class="text-center text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-8">Sila pilih cara bayaran</p>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <div onclick="selectMethod('Cash', this)" class="method-card active glass p-4 rounded-2xl flex flex-col items-center gap-2 border border-white/5">
                <i class="fas fa-money-bill-wave text-lg"></i>
                <span class="text-[9px] font-bold uppercase">Tunai</span>
            </div>
            <div onclick="selectMethod('Online', this)" class="method-card glass p-4 rounded-2xl flex flex-col items-center gap-2 border border-white/5">
                <i class="fas fa-mobile-alt text-lg"></i>
                <span class="text-[9px] font-bold uppercase">Online</span>
            </div>
            <div onclick="selectMethod('Card', this)" class="method-card glass p-4 rounded-2xl flex flex-col items-center gap-2 border border-white/5">
                <i class="fas fa-credit-card text-lg"></i>
                <span class="text-[9px] font-bold uppercase">Kad</span>
            </div>
        </div>

        <div class="space-y-3 mb-8 bg-white/5 p-6 rounded-3xl border border-white/5">
            <div class="flex justify-between text-[11px] font-bold uppercase text-slate-400">
                <span>Subtotal</span>
                <span id="subtotal-val">RM 0.00</span>
            </div>
            <div class="flex justify-between text-[11px] font-bold uppercase text-slate-400">
                <span>Tax (0%)</span>
                <span>RM 0.00</span>
            </div>
            <div class="pt-3 border-t border-white/10 flex justify-between text-lg font-black italic">
                <span>TOTAL</span>
                <span id="final-total" class="text-blue-500">RM 0.00</span>
            </div>
        </div>

        <button onclick="processCheckout()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-[11px] uppercase tracking-[0.3em] shadow-xl shadow-blue-600/30">Sahkan Bayaran</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config (Sama seperti sebelum ini)
        const firebaseConfig = {
          apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
          authDomain: "ketick-os.firebaseapp.com",
          projectId: "ketick-os",
          storageBucket: "ketick-os.firebasestorage.app",
          messagingSenderId: "407192673747",
          appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let cart = [];
        let selectedMethod = "Cash";

        function loadProducts() {
            db.collection("inventory").onSnapshot(snap => {
                const list = document.getElementById('product-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    list.innerHTML += `
                        <div onclick="addToCart('${doc.id}', '${p.name}', ${p.price})" class="product-card glass p-5 rounded-[2.5rem] border border-white/5 relative overflow-hidden transition-all">
                            <i class="fas fa-box text-blue-500/20 absolute -right-2 -bottom-2 text-5xl"></i>
                            <h3 class="font-bold text-xs leading-tight mb-1 truncate uppercase">${p.name}</h3>
                            <p class="text-blue-500 font-black text-sm tracking-tighter">RM ${parseFloat(p.price).toFixed(2)}</p>
                            <p class="text-[8px] font-bold text-slate-600 mt-2 uppercase">Stok: ${p.stock || 0}</p>
                        </div>
                    `;
                });
            });
        }

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateUI();
        }

        function updateUI() {
            const bar = document.getElementById('checkout-bar');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('final-total').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('subtotal-val').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('item-count').innerText = `${cart.length} Item Dipilih`;
            
            if(cart.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');
        }

        function selectMethod(method, el) {
            selectedMethod = method;
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function openPayment() {
            document.getElementById('payment-overlay').classList.remove('hidden');
            document.getElementById('payment-modal').classList.add('show');
        }

        function closePayment() {
            document.getElementById('payment-overlay').classList.add('hidden');
            document.getElementById('payment-modal').classList.remove('show');
        }

        function clearCart() { cart = []; updateUI(); }

        async function processCheckout() {
            if(cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            const saleData = {
                items: cart,
                totalPrice: total,
                paymentMethod: selectedMethod,
                date: new Date().toISOString().split('T')[0],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("sales").add(saleData);
                // Tolak stok
                for(let item of cart) {
                    const ref = db.collection("inventory").doc(item.id);
                    await db.runTransaction(async (t) => {
                        const doc = await t.get(ref);
                        const newStock = (doc.data().stock || 0) - 1;
                        t.update(ref, { stock: Math.max(0, newStock) });
                    });
                }
                alert(`Bayaran RM ${total.toFixed(2)} (${selectedMethod}) Berjaya!`);
                cart = [];
                updateUI();
                closePayment();
            } catch (e) { alert("Ralat!"); }
        }

        loadProducts();
    </script>
</body>
</html>
