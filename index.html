<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETICK OS | ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-t: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 100; padding: 0 5px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; color: #64748b; background: none; border: none; outline: none !important; }
        .nav-btn i { font-size: 1.1rem; }
        .nav-btn span { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-btn.active { color: #3b82f6; }
        #security-overlay { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; align-items: center; justify-content: center; }
        .pin-input { width: 55px; height: 65px; text-align: center; font-size: 24px; font-weight: 800; border-radius: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        iframe { border: none; width: 100%; height: 100%; border-radius: 2rem 2rem 0 0; background: #020617; }
    </style>
</head>
<body>

    <div id="security-overlay">
        <div class="max-w-xs w-full p-8 rounded-[2.5rem] glass text-center">
            <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                <i class="fas fa-fingerprint text-2xl text-blue-500"></i>
            </div>
            <h2 class="text-xl font-extrabold mb-6">KETICK ACCESS</h2>
            <div class="flex justify-center gap-3 mb-8">
                <input type="password" maxlength="1" class="pin-input" autofocus>
                <input type="password" maxlength="1" class="pin-input">
                <input type="password" maxlength="1" class="pin-input">
                <input type="password" maxlength="1" class="pin-input">
            </div>
            <button onclick="verifyAccess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-blue-600/20 uppercase tracking-widest text-xs">Authorize</button>
        </div>
    </div>

    <nav class="hidden lg:flex fixed top-0 left-0 w-72 h-screen glass border-r border-white/5 flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black">K</div>
            <h1 class="font-extrabold text-lg tracking-tighter">KETICK OS <span class="text-[10px] text-blue-500">ERP</span></h1>
        </div>
        <div class="flex-grow overflow-y-auto no-scrollbar space-y-1">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest py-2">Utama</p>
            <button onclick="loadModule('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-sm"><i class="fas fa-home w-6"></i> Dashboard</button>
            <button onclick="loadModule('pos')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-sm"><i class="fas fa-cash-register w-6"></i> Mini POS</button>
            <button onclick="loadModule('products')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-sm"><i class="fas fa-tag w-6"></i> Products</button>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest py-2 mt-4">Operasi</p>
            <button onclick="loadModule('stock')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-sm"><i class="fas fa-boxes w-6"></i> Stock Tracking</button>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest py-2 mt-4">Kewangan</p>
            <button onclick="loadModule('bank')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-sm"><i class="fas fa-university w-6"></i> Bank & Cash</button>
            <button onclick="loadModule('accounting')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-sm"><i class="fas fa-file-invoice-dollar w-6"></i> Accounting</button>
        </div>
    </nav>

    <div class="mobile-nav lg:hidden">
        <button onclick="loadModule('dashboard')" class="nav-btn active"><i class="fas fa-th-large"></i><span>Home</span></button>
        <button onclick="loadModule('pos')" class="nav-btn"><i class="fas fa-cash-register"></i><span>POS</span></button>
        <button onclick="loadModule('products')" class="nav-btn"><i class="fas fa-tag"></i><span>Prod</span></button>
        <button onclick="loadModule('stock')" class="nav-btn"><i class="fas fa-boxes"></i><span>Stock</span></button>
        <button onclick="toggleMoreMenu()" class="nav-btn"><i class="fas fa-ellipsis-h"></i><span>More</span></button>
    </div>

    <main class="lg:ml-72 h-screen flex flex-col">
        <header class="p-6 flex justify-between items-center">
            <div>
                <h2 id="moduleTitle" class="text-xl font-black uppercase tracking-tighter text-blue-500">DASHBOARD</h2>
                <div class="flex items-center gap-2 mt-1">
                    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">System Online</span>
                </div>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin&background=0D6EFD&color=fff" class="w-8 h-8 rounded-xl border border-white/10 shadow-lg shadow-blue-500/10">
        </header>

        <div class="flex-grow relative overflow-hidden">
            <iframe id="app-frame" class="hidden"></iframe>
            <div id="dashboard-view" class="p-4 space-y-4 overflow-y-auto h-full pb-24 text-white">
                <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-blue-600 to-indigo-800 shadow-2xl relative overflow-hidden group active:scale-95 transition-transform" onclick="loadModule('pos')">
                    <div class="relative z-10 text-white">
                        <h2 class="text-2xl font-black mb-1">Mula Jualan</h2>
                        <p class="opacity-70 text-xs uppercase font-bold tracking-widest text-white">Klik untuk lancarkan POS</p>
                    </div>
                    <i class="fas fa-bolt absolute right-[-10px] bottom-[-10px] text-9xl opacity-10 rotate-12 group-hover:scale-110 transition-transform"></i>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 glass rounded-[2rem] border-b-4 border-blue-500" onclick="loadModule('stock')">
                        <i class="fas fa-box text-blue-500 mb-3 text-xl"></i>
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Jumlah Item Stok</p>
                        <h4 id="dash-total-stock" class="text-lg font-black mt-1">Mengira...</h4>
                    </div>
                    <div class="p-6 glass rounded-[2rem] border-b-4 border-emerald-500">
                        <i class="fas fa-chart-line text-emerald-500 mb-3 text-xl"></i>
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Jualan Hari Ini</p>
                        <h4 id="dash-today-sales" class="text-lg font-black mt-1 text-emerald-400">RM 0.00</h4>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. CONFIG FIREBASE (Sama macam awak punya)
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 2. AUTO-UPDATE DATA DASHBOARD
        function startDashboardSync() {
            const today = new Date().toISOString().split('T')[0];

            // Update Jualan Hari Ini
            db.collection("sales").where("date", "==", today).onSnapshot(snap => {
                let total = 0;
                snap.forEach(doc => { total += parseFloat(doc.data().totalPrice || 0); });
                document.getElementById('dash-today-sales').innerText = `RM ${total.toFixed(2)}`;
            });

            // Update Jumlah Stok
            db.collection("inventory").onSnapshot(snap => {
                let count = 0;
                snap.forEach(doc => { 
                    let s = parseInt(doc.data().stock || 0);
                    count += s;
                });
                document.getElementById('dash-total-stock').innerText = `${count} UNIT`;
            });
        }

        // Panggil sync selepas PIN berjaya atau terus jalan
        startDashboardSync();

        // 3. CORE UI FUNCTIONS
        function verifyAccess() {
            let pin = "";
            document.querySelectorAll('.pin-input').forEach(i => pin += i.value);
            if (pin === "1234") {
                document.getElementById('security-overlay').style.display = 'none';
            } else {
                alert("PIN SALAH!");
                document.querySelectorAll('.pin-input').forEach(i => i.value = "");
                document.querySelectorAll('.pin-input')[0].focus();
            }
        }

        function loadModule(name) {
            const frame = document.getElementById('app-frame');
            const dash = document.getElementById('dashboard-view');
            document.getElementById('moduleTitle').innerText = name.replace('-', ' ');

            if (name === 'dashboard') {
                frame.classList.add('hidden');
                dash.classList.remove('hidden');
            } else {
                frame.src = `./${name}/index.html`;
                frame.classList.remove('hidden');
                dash.classList.add('hidden');
            }
        }

        const inputs = document.querySelectorAll('.pin-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => { if (input.value && index < 3) inputs[index+1].focus(); });
        });
    </script>
</body>
</html>
