<!DOCTYPE html>
<html>
<body style="background:#020617; color:white; font-family:sans-serif; padding:20px;">
    <h2>Ketick OS Database Setup</h2>
    <p id="status">Sila tekan butang di bawah untuk masukkan data stok awal...</p>
    <button onclick="runSetup()" style="padding:15px; background:blue; color:white; border:none; border-radius:10px;">MASUKKAN DATA STOK</button>

    <script type="module">
        import { db, collection, addDoc } from "./firebase-config.js";

        window.runSetup = async function() {
            const status = document.getElementById('status');
            status.innerText = "Sila tunggu, tengah hantar data...";

            const initialStock = [
                { name: "Sneakers Pro", category: "Kasut", stock: 50, price: 150.00, min: 5 },
                { name: "Formal Leather", category: "Kasut", stock: 20, price: 280.00, min: 3 },
                { name: "Sport Socks", category: "Aksesori", stock: 100, price: 15.00, min: 10 },
                { name: "Shoe Cleaner", category: "Aksesori", stock: 30, price: 45.00, min: 5 }
            ];

            try {
                for (let item of initialStock) {
                    await addDoc(collection(db, "inventory"), item);
                }
                status.innerText = "BERJAYA! Data stok dah masuk Firestore. Awak boleh padam fail setup.html ni sekarang.";
            } catch (e) {
                status.innerText = "Gagal: " + e.message;
            }
        }
    </script>
</body>
</html>
