<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:active { transform: scale(0.95); }
        .payment-btn.active { border-color: #10b981; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .cat-btn.active { background: #10b981; color: white; border-color: #10b981; }
        #cart-overlay, #payment-modal { z-index: 9999 !important; }
    </style>
</head>
<body class="p-4 no-scrollbar pb-32">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase text-white">Mini <span class="text-emerald-500">POS</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Kaunter Jualan Pantas</p>
        </div>
        <button onclick="toggleCart()" class="relative w-12 h-12 glass rounded-2xl flex items-center justify-center border-emerald-500/30">
            <i class="fas fa-shopping-basket text-emerald-500"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-emerald-500 text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </div>

    <div class="space-y-4 mb-6">
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Cari produk..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-emerald-500">
        </div>
        
        <div id="categoryContainer" class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button onclick="filterCategory('ALL')" class="cat-btn active flex-shrink-0 px-5 py-2 glass rounded-xl text-[10px] font-black uppercase border border-white/10">Semua</button>
        </div>
    </div>

    <div id="productGrid" class="grid grid-cols-2 gap-4"></div>

    <div id="cart-overlay" class="fixed inset-0 bg-[#020617] translate-y-full transition-transform duration-500 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black tracking-tighter text-white">BAKUL <span class="text-emerald-500">JUALAN</span></h2>
            <button onclick="toggleCart()" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-times text-slate-400"></i></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-3 no-scrollbar"></div>
        <div class="mt-4 flex gap-2">
            <input type="text" id="coupon-code" placeholder="Kod Kupon" class="flex-grow bg-white/5 border border-white/10 rounded-xl px-4 text-xs focus:outline-none text-white">
            <button onclick="applyCoupon()" class="bg-blue-600 px-4 py-3 rounded-xl text-[10px] font-black uppercase">Guna</button>
        </div>
        <div class="mt-4 p-5 glass rounded-3xl space-y-2">
            <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase"><span>Subtotal</span> <span id="view-subtotal">RM 0.00</span></div>
            <div class="flex justify-between text-[10px] font-bold text-red-400 uppercase"><span>Diskaun</span> <span id="view-discount">- RM 0.00</span></div>
            <div class="flex justify-between items-center pt-2 border-t border-white/5">
                <span class="text-xs font-black uppercase tracking-widest text-white">Total</span>
                <span id="total-price" class="text-xl font-black text-emerald-400 tracking-tighter">RM 0.00</span>
            </div>
        </div>
        <button onclick="showPaymentModal()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl mt-4 mb-4 uppercase text-xs tracking-[0.2em]">Sahkan Bayaran</button>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-[#020617]/95 hidden p-6 flex flex-col backdrop-blur-xl">
        <div class="text-center mb-8 mt-4">
            <h2 id="pay-grand-total" class="text-5xl font-black text-white tracking-tighter">RM 0.00</h2>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="setMethod('Tunai')" class="payment-btn active p-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 border border-white/5 text-white"><i class="fas fa-money-bill-wave text-xl text-emerald-500"></i> Tunai</button>
            <button onclick="setMethod('Transfer')" class="payment-btn p-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 border border-white/5 text-white"><i class="fas fa-university text-xl text-blue-500"></i> Transfer</button>
            <button onclick="setMethod('QR')" class="payment-btn p-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 border border-white/5 text-white"><i class="fas fa-qrcode text-xl text-purple-500"></i> QR Code</button>
            <button onclick="setMethod('Card')" class="payment-btn p-4 glass rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-2 border border-white/5 text-white"><i class="fas fa-credit-card text-xl text-orange-500"></i> Kad</button>
        </div>
        <div class="space-y-4 flex-grow">
            <div class="p-4 glass rounded-2xl border-white/10">
                <label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Jumlah Diterima (RM)</label>
                <input type="number" id="amount-paid" oninput="calcChange()" placeholder="0.00" class="w-full bg-transparent text-2xl font-black focus:outline-none text-emerald-400">
            </div>
            <div class="p-4 bg-white/5 rounded-2xl">
                <label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Baki Pulangan (RM)</label>
                <h3 id="change-amount" class="text-2xl font-black text-white">0.00</h3>
            </div>
        </div>
        <div class="flex gap-3 mt-6 mb-8">
            <button onclick="closePaymentModal()" class="flex-1 bg-white/5 py-4 rounded-2xl font-black text-xs uppercase text-white">Batal</button>
            <button onclick="finalCheckout()" class="flex-[2] bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase text-white">Selesai & Simpan</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = [];
        let allProducts = [];
        let discount = 0;
        let paymentMethod = 'Tunai';
        let currentCategory = 'ALL';

        function loadProducts() {
            db.collection("inventory").onSnapshot(snap => {
                allProducts = [];
                const categorySet = new Set();
                snap.forEach(doc => {
                    const data = doc.data();
                    allProducts.push({ id: doc.id, ...data });
                    if(data.category) categorySet.add(data.category);
                });
                renderCategories(Array.from(categorySet));
                renderProducts();
            });
        }

        function renderCategories(categories) {
            const container = document.getElementById('categoryContainer');
            let html = `<button onclick="filterCategory('ALL')" class="cat-btn ${currentCategory === 'ALL' ? 'active' : ''} flex-shrink-0 px-5 py-2 glass rounded-xl text-[10px] font-black uppercase border border-white/10">Semua</button>`;
            categories.forEach(cat => {
                html += `<button onclick="filterCategory('${cat}')" class="cat-btn ${currentCategory === cat ? 'active' : ''} flex-shrink-0 px-5 py-2 glass rounded-xl text-[10px] font-black uppercase border border-white/10">${cat}</button>`;
            });
            container.innerHTML = html;
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchCat = currentCategory === 'ALL' || p.category === currentCategory;
                const matchSearch = p.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });

            grid.innerHTML = filtered.map(p => `
                <div onclick="addToCart('${p.id}', '${p.name}', ${p.price})" class="product-card p-4 glass rounded-[2.5rem] border border-white/5">
                    <div class="w-full aspect-square bg-white/5 rounded-3xl mb-3 overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-bold text-[11px] truncate uppercase tracking-tighter">${p.name}</h3>
                    <div class="flex justify-between items-center mt-1">
                        <p class="text-emerald-400 font-black text-xs">RM ${p.price.toFixed(2)}</p>
                        <p class="text-[8px] font-bold ${p.stock <= 5 ? 'text-red-500' : 'text-slate-500'}">Stok: ${p.stock}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderProducts();
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toUpperCase() === cat || (cat === 'ALL' && btn.innerText === 'SEMUA'));
            });
        }

        function filterProducts() { renderProducts(); }
        function setParentNav(s) { if(window.parent) window.parent.postMessage(s === 'hide' ? 'hideNav' : 'showNav', '*'); }
        function toggleCart() {
            const el = document.getElementById('cart-overlay');
            el.classList.toggle('translate-y-full');
            setParentNav(el.classList.contains('translate-y-full') ? 'show' : 'hide');
        }

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart-items');
            let subtotal = cart.reduce((acc, item) => acc + item.price, 0);
            let total = subtotal - discount;
            container.innerHTML = cart.length === 0 ? `<div class='text-center py-10 text-slate-600 text-[10px] uppercase font-bold'>Bakul Kosong</div>` :
                cart.map((item, i) => `<div class="flex justify-between items-center p-4 glass rounded-2xl border-white/5"><div><p class="font-bold text-sm text-white uppercase text-[10px]">${item.name}</p><p class="text-[10px] text-emerald-500 font-black">RM ${item.price.toFixed(2)}</p></div><button onclick="cart.splice(${i},1);updateUI()" class="text-red-500/30"><i class="fas fa-trash"></i></button></div>`).join('');
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('view-subtotal').innerText = `RM ${subtotal.toFixed(2)}`;
            document.getElementById('view-discount').innerText = `- RM ${discount.toFixed(2)}`;
            document.getElementById('total-price').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('pay-grand-total').innerText = `RM ${total.toFixed(2)}`;
        }

        function applyCoupon() {
            const code = document.getElementById('coupon-code').value;
            if(code === 'RAYA2026') { discount = 5.00; alert("Kupon RM5.00 Diterima!"); } else { discount = 0; alert("Kupon Tidak Sah"); }
            updateUI();
        }

        function showPaymentModal() { if(cart.length > 0) document.getElementById('payment-modal').classList.remove('hidden'); }
        function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }
        function setMethod(m) { paymentMethod = m; document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active')); event.currentTarget.classList.add('active'); }
        function calcChange() {
            let total = cart.reduce((acc, item) => acc + item.price, 0) - discount;
            let paid = parseFloat(document.getElementById('amount-paid').value) || 0;
            document.getElementById('change-amount').innerText = (paid - total).toFixed(2);
        }

        async function finalCheckout() {
            let subtotal = cart.reduce((acc, item) => acc + item.price, 0);
            let total = subtotal - discount;
            let paid = parseFloat(document.getElementById('amount-paid').value) || 0;
            const now = new Date();

            if(paid < total && paymentMethod === 'Tunai') return alert("Bayaran tidak cukup!");

            try {
                // 1. Simpan rekod jualan
                await db.collection("sales").add({
                    items: cart,
                    subtotal: subtotal,
                    discount: discount,
                    totalPrice: total,
                    amountPaid: paid,
                    change: paid - total,
                    method: paymentMethod,
                    time: now.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' }),
                    date: now.toISOString().split('T')[0],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. TOLAK STOK AUTOMATIK (Link ke Inventory)
                const batch = db.batch();
                cart.forEach(item => {
                    const ref = db.collection("inventory").doc(item.id);
                    batch.update(ref, {
                        stock: firebase.firestore.FieldValue.increment(-1)
                    });
                });
                await batch.commit();

                alert("Transaksi Berjaya & Stok Dikemaskini!");
                cart = []; discount = 0; document.getElementById('amount-paid').value = '';
                updateUI(); closePaymentModal(); toggleCart();
            } catch(e) { alert("Error: " + e.message); }
        }

        loadProducts();
    </script>
</body>
</html>
