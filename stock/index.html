<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: transparent; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 13px; color: white; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 no-scrollbar">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h2 class="text-2xl font-black tracking-tighter uppercase">Inventory <span class="text-blue-500">Master</span></h2>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Sistem Pengurusan Stok Real-time</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-xl shadow-blue-600/20 transition-all">
            <i class="fas fa-plus mr-2"></i> Tambah Item
        </button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
        <div class="glass p-6 rounded-[2.5rem]">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total SKU</p>
            <h3 id="totalSku" class="text-2xl font-black tracking-tighter">0</h3>
        </div>
        <div class="glass p-6 rounded-[2.5rem] border-l-4 border-l-red-500">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Stok Rendah</p>
            <h3 id="lowStock" class="text-2xl font-black text-red-400 tracking-tighter">0</h3>
        </div>
    </div>

    <div class="glass rounded-[2.5rem] overflow-x-auto no-scrollbar border border-white/5">
        <table class="w-full text-left border-collapse min-w-[600px]">
            <thead class="bg-white/5 text-slate-400 uppercase font-black text-[9px] tracking-widest">
                <tr>
                    <th class="p-5">Produk</th>
                    <th class="p-5">Kategori</th>
                    <th class="p-5 text-right">Harga (RM)</th>
                    <th class="p-5 text-center">Baki Stok</th>
                    <th class="p-5 text-center">Tindakan</th>
                </tr>
            </thead>
            <tbody id="inventoryTable" class="text-xs">
                <tr><td colspan="5" class="p-10 text-center text-slate-500 font-bold uppercase tracking-widest animate-pulse">Memuatkan data...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="addModal" class="modal">
        <div class="glass w-full max-w-lg rounded-[3rem] p-8 relative border border-white/10 shadow-2xl">
            <button onclick="toggleModal(false)" class="absolute top-6 right-6 text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
            
            <h3 class="text-xl font-black uppercase tracking-tighter mb-6">Daftar Produk Baru</h3>
            
            <form id="productForm" class="space-y-4">
                <div class="flex flex-col items-center mb-4">
                    <div id="imagePreview" class="w-24 h-24 rounded-2xl bg-white/5 border border-dashed border-white/20 flex items-center justify-center mb-2 overflow-hidden">
                        <i class="fas fa-image text-slate-600 text-2xl"></i>
                    </div>
                    <label class="cursor-pointer bg-blue-600/10 text-blue-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest border border-blue-500/20">
                        Pilih Gambar
                        <input type="file" id="productImage" accept="image/*" class="hidden" onchange="previewFile()">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2">Nama Produk</label>
                        <input type="text" id="itemName" class="input-style" placeholder="Contoh: Kasut Digital X1" required>
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2">Kategori</label>
                        <select id="itemCategory" class="input-style">
                            <option value="MAKANAN">MAKANAN</option>
                            <option value="MINUMAN">MINUMAN</option>
                            <option value="SERVIS">SERVIS</option>
                            <option value="LAIN-LAIN">LAIN-LAIN</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2">Harga Jualan (RM)</label>
                        <input type="number" step="0.01" id="itemPrice" class="input-style" placeholder="0.00" required>
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2">Stok Awal</label>
                        <input type="number" id="itemStock" class="input-style" placeholder="0" required>
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2">Kod Produk (SKU)</label>
                        <input type="text" id="itemSku" class="input-style" placeholder="P001">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] mt-6 transition-all shadow-lg shadow-blue-600/20">
                    Simpan Ke Database
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
          authDomain: "ketick-os.firebaseapp.com",
          projectId: "ketick-os",
          storageBucket: "ketick-os.firebasestorage.app",
          messagingSenderId: "407192673747",
          appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let base64Image = "";

        // Modal Toggle
        function toggleModal(show) {
            document.getElementById('addModal').style.display = show ? 'flex' : 'none';
            if(!show) document.getElementById('productForm').reset();
        }

        // Preview & Convert Image
        function previewFile() {
            const file = document.querySelector('input[type=file]').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                base64Image = reader.result;
                document.getElementById('imagePreview').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
            }
            if (file) { reader.readAsDataURL(file); }
        }

        // Submit Form
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.submitter;
            btn.innerText = "SEDANG DISIMPAN...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                price: parseFloat(document.getElementById('itemPrice').value),
                stock: parseInt(document.getElementById('itemStock').value),
                sku: document.getElementById('itemSku').value,
                image: base64Image || 'https://via.placeholder.com/150',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("inventory").add(data);
                toggleModal(false);
                base64Image = "";
                document.getElementById('imagePreview').innerHTML = `<i class="fas fa-image text-slate-600 text-2xl"></i>`;
            } catch (err) {
                alert("Ralat simpan data!");
            } finally {
                btn.innerText = "SIMPAN KE DATABASE";
                btn.disabled = false;
            }
        });

        // Real-time Listener
        db.collection("inventory").orderBy("createdAt", "desc").onSnapshot(snap => {
            const table = document.getElementById('inventoryTable');
            table.innerHTML = '';
            let lowCount = 0;

            snap.forEach(doc => {
                const p = doc.data();
                if(p.stock <= 5) lowCount++;

                table.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                        <td class="p-4 flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl overflow-hidden bg-white/5">
                                <img src="${p.image}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <p class="font-black uppercase tracking-tight">${p.name}</p>
                                <p class="text-[8px] text-slate-600 font-bold">SKU: ${p.sku || 'N/A'}</p>
                            </div>
                        </td>
                        <td class="p-4"><span class="bg-slate-800 px-3 py-1 rounded-md text-[9px] font-bold">${p.category}</span></td>
                        <td class="p-4 text-right font-black text-blue-400">RM ${p.price.toFixed(2)}</td>
                        <td class="p-4 text-center">
                            <span class="${p.stock <= 5 ? 'text-red-500' : 'text-emerald-500'} font-black text-sm">${p.stock}</span>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="deleteItem('${doc.id}')" class="text-slate-600 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('totalSku').innerText = snap.size;
            document.getElementById('lowStock').innerText = lowCount;
        });

        async function deleteItem(id) {
            if(confirm("Padam item ini?")) {
                await db.collection("inventory").doc(id).delete();
            }
        }
    </script>
</body>
</html>
