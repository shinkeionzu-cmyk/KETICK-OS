<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card:active { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Grid Responsif: 1 column mobile, 2 columns desktop */
        .pos-container {
            display: grid;
            grid-template-columns: 1fr;
            height: 100vh;
        }
        @media (min-width: 1024px) {
            .pos-container { grid-template-columns: 1fr 400px; }
        }
    </style>
</head>
<body>

    <div class="pos-container">
        <section class="flex flex-col h-full border-r border-white/5">
            <header class="p-4 flex items-center justify-between glass">
                <h1 class="font-black text-lg tracking-tighter">ITEM JUALAN</h1>
                <div class="relative w-48">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-500 text-xs"></i>
                    <input type="text" id="searchItem" placeholder="Cari produk..." 
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-9 pr-4 text-xs focus:outline-none focus:border-blue-500">
                </div>
            </header>

            <div id="productGrid" class="flex-grow overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 no-scrollbar">
                <div class="animate-pulse text-slate-500 text-xs p-10 text-center col-span-full">Memuatkan produk...</div>
            </div>
        </section>

        <section class="flex flex-col h-full bg-slate-900/50 glass">
            <div class="p-4 border-b border-white/5 flex justify-between items-center">
                <h2 class="font-bold text-sm uppercase tracking-widest">Troli <span id="cartCount" class="bg-blue-600 text-[10px] px-2 py-0.5 rounded-full ml-1">0</span></h2>
                <button onclick="clearCart()" class="text-red-400 text-[10px] font-bold uppercase hover:underline">Kosongkan</button>
            </div>

            <div id="cartItems" class="flex-grow overflow-y-auto p-4 space-y-3 no-scrollbar">
                <div class="text-center py-20 opacity-20">
                    <i class="fas fa-shopping-basket text-4xl mb-2"></i>
                    <p class="text-xs">Troli Kosong</p>
                </div>
            </div>

            <div class="p-6 space-y-4 glass rounded-t-[2rem]">
                <div class="space-y-2">
                    <div class="flex justify-between text-xs text-slate-400">
                        <span>Subtotal</span>
                        <span id="subtotal">RM 0.00</span>
                    </div>
                    <div class="flex justify-between font-black text-xl border-t border-white/10 pt-2">
                        <span>TOTAL</span>
                        <span id="totalAmount" class="text-emerald-400">RM 0.00</span>
                    </div>
                </div>
                <button onclick="processCheckout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-blue-600/20 uppercase tracking-widest text-xs">
                    Sahkan Jualan (Bayar)
                </button>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allProducts = [];
        let cart = [];

        // Load Produk dari Firebase
        function loadProducts() {
            db.collection("inventory").onSnapshot(snap => {
                allProducts = [];
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                
                snap.forEach(doc => {
                    const p = { id: doc.id, ...doc.data() };
                    allProducts.push(p);
                    
                    const card = document.createElement('div');
                    card.className = "product-card glass p-3 rounded-2xl flex flex-col gap-2 cursor-pointer hover:border-blue-500/50 transition-all";
                    card.onclick = () => addToCart(p);
                    card.innerHTML = `
                        <div class="w-full aspect-square bg-white/5 rounded-xl overflow-hidden">
                            <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-[10px] font-bold truncate uppercase">${p.name}</h3>
                        <p class="text-blue-400 font-black text-xs">RM ${parseFloat(p.price).toFixed(2)}</p>
                        <p class="text-[8px] text-slate-500 font-bold">STOK: ${p.stock}</p>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function addToCart(product) {
            if(parseInt(product.stock) <= 0) return alert("Stok Habis!");
            
            const existing = cart.find(item => item.id === product.id);
            if(existing) {
                if(existing.qty < product.stock) existing.qty++;
                else alert("Had stok dicapai!");
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('totalAmount');
            const subtotalEl = document.getElementById('subtotal');
            const countEl = document.getElementById('cartCount');
            
            container.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const sub = item.price * item.qty;
                total += sub;
                
                container.innerHTML += `
                    <div class="flex items-center gap-3 p-3 glass rounded-xl border border-white/5">
                        <div class="w-10 h-10 bg-white/5 rounded-lg overflow-hidden">
                            <img src="${item.image}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-grow">
                            <h4 class="text-[10px] font-black uppercase truncate">${item.name}</h4>
                            <p class="text-[10px] text-blue-400 font-bold">${item.qty}x RM ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" class="text-slate-500 hover:text-red-500">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                `;
            });

            countEl.innerText = cart.length;
            subtotalEl.innerText = `RM ${total.toFixed(2)}`;
            totalEl.innerText = `RM ${total.toFixed(2)}`;
        }

        function clearCart() { cart = []; renderCart(); }

        async function processCheckout() {
            if(cart.length === 0) return alert("Troli kosong!");

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const batch = db.batch();
            const saleId = "INV-" + Date.now();

            try {
                // 1. Rekod Jualan
                const saleRef = db.collection("sales").doc(saleId);
                batch.set(saleRef, {
                    items: cart,
                    totalValue: total,
                    date: new Date().toISOString().split('T')[0],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. Potong Stok
                cart.forEach(item => {
                    const invRef = db.collection("inventory").doc(item.id);
                    batch.update(invRef, {
                        stock: firebase.firestore.FieldValue.increment(-item.qty)
                    });
                });

                await batch.commit();
                alert("Jualan Berjaya!");
                clearCart();
            } catch (e) {
                console.error(e);
                alert("Ralat Sistem!");
            }
        }

        // Search Filter
        document.getElementById('searchItem').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'flex' : 'none';
            });
        });

        loadProducts();
    </script>
</body>
</html>
