<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: transparent; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Layout Grid */
        .pos-grid {
            display: grid;
            grid-template-columns: 1fr;
            height: calc(100vh - 10px);
        }
        @media (min-width: 1024px) {
            .pos-grid { grid-template-columns: 1fr 380px; }
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="pos-grid gap-4">
        <div class="flex flex-col h-full overflow-hidden bg-slate-900/20 rounded-[2rem] border border-white/5">
            <div class="p-4 glass flex justify-between items-center">
                <h2 class="font-black text-sm uppercase tracking-tighter">Katalog Produk</h2>
                <input type="text" id="searchItem" placeholder="Cari..." 
                    class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-blue-500 w-32 md:w-48">
            </div>

            <div id="productGrid" class="flex-grow overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 no-scrollbar">
                </div>
        </div>

        <div class="flex flex-col h-full bg-slate-900/40 rounded-[2rem] border border-white/10 glass overflow-hidden">
            <div class="p-5 border-b border-white/5">
                <h2 class="font-black text-sm uppercase">Pesanan Semasa</h2>
            </div>

            <div id="cartItems" class="flex-grow overflow-y-auto p-4 space-y-3 no-scrollbar">
                </div>

            <div class="p-6 bg-blue-600/10 border-t border-white/5 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-400">JUMLAH KESELURUHAN</span>
                    <span id="totalAmount" class="text-2xl font-black text-emerald-400">RM 0.00</span>
                </div>
                <button onclick="processCheckout()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-blue-600/20 transition-all">
                    Sahkan & Bayar
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = [];

        // Load Produk
        db.collection("inventory").onSnapshot(snap => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const p = { id: doc.id, ...doc.data() };
                const card = document.createElement('div');
                card.className = "glass p-3 rounded-2xl cursor-pointer hover:border-blue-500/50 transition-all";
                card.onclick = () => addToCart(p);
                card.innerHTML = `
                    <div class="aspect-square bg-white/5 rounded-xl mb-2 overflow-hidden">
                        <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-[10px] font-black uppercase truncate">${p.name}</h3>
                    <p class="text-blue-400 font-bold text-xs mt-1">RM ${parseFloat(p.price).toFixed(2)}</p>
                `;
                grid.appendChild(card);
            });
        });

        function addToCart(p) {
            const exist = cart.find(i => i.id === p.id);
            if(exist) { exist.qty++; } else { cart.push({...p, qty: 1}); }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                container.innerHTML += `
                    <div class="flex items-center justify-between p-3 glass rounded-xl border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black uppercase">${item.name}</span>
                            <span class="text-[9px] text-blue-400">${item.qty} x RM ${item.price}</span>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 text-xs"><i class="fas fa-times-circle"></i></button>
                    </div>
                `;
            });
            document.getElementById('totalAmount').innerText = `RM ${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        async function processCheckout() {
            if(cart.length === 0) return alert("Troli kosong!");
            const batch = db.batch();
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            try {
                const saleRef = db.collection("sales").doc();
                batch.set(saleRef, {
                    items: cart,
                    totalValue: total,
                    date: new Date().toISOString().split('T')[0],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                cart.forEach(item => {
                    const invRef = db.collection("inventory").doc(item.id);
                    batch.update(invRef, { stock: firebase.firestore.FieldValue.increment(-item.qty) });
                });

                await batch.commit();
                alert("Jualan Berjaya!");
                cart = [];
                renderCart();
            } catch(e) { alert("Ralat!"); }
        }

        // Search
        document.getElementById('searchItem').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('#productGrid > div').forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
