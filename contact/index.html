<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black uppercase tracking-tight">CRM Contacts</h1>
        <button class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-user-plus"></i></button>
    </div>

    <div class="flex gap-2 mb-6 p-1 glass rounded-2xl">
        <button class="flex-1 py-2 rounded-xl bg-blue-600 text-[10px] font-bold">SEMUA</button>
        <button class="flex-1 py-2 rounded-xl text-[10px] font-bold opacity-50">PELANGGAN</button>
        <button class="flex-1 py-2 rounded-xl text-[10px] font-bold opacity-50">PEMBEKAL</button>
    </div>

    <div class="space-y-3">
        <div class="glass p-4 rounded-[1.5rem] flex justify-between items-center border-l-4 border-blue-500">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold text-blue-400 text-xs">MK</div>
                <div>
                    <p class="text-sm font-bold">Mat Kasut</p>
                    <p class="text-[9px] text-slate-500 font-bold uppercase">Pelanggan</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="tel:0123" class="w-8 h-8 glass rounded-lg flex items-center justify-center text-emerald-500"><i class="fas fa-phone-alt text-xs"></i></a>
                <a href="#" class="w-8 h-8 glass rounded-lg flex items-center justify-center text-blue-400"><i class="fab fa-whatsapp text-xs"></i></a>
            </div>
        </div>
    </div>
</body>
</html>
