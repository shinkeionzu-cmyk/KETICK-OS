<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KETICK POS | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Kita kawal scroll dalam div sahaja */
        }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Kontena Produk yang boleh scroll */
        #scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 20px;
        }

        /* Bar Jualan yang sentiasa nampak di atas navigasi utama */
        #sticky-bar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            padding-bottom: 30px; /* Extra space supaya tak kena tutup navigasi bawah */
        }

        #cart-panel { 
            position: fixed; inset: 0; z-index: 500;
            transition: transform 0.4s ease;
            transform: translateY(100%);
        }
        #cart-panel.show { transform: translateY(0); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card:active { transform: scale(0.95); background: rgba(59, 130, 246, 0.1); }
        .pay-method.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    </style>
</head>
<body>

    <div class="p-6 flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="text-blue-500 font-black italic text-xl uppercase tracking-tighter">Ketick<span class="text-white">Pos</span></h1>
            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Terminal Jualan</p>
        </div>
        <button onclick="clearCart()" class="text-red-500 opacity-50"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="scroll-area" class="no-scrollbar">
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-20 opacity-20 text-[10px] font-bold uppercase tracking-[0.3em]">
                Memuatkan Inventori...
            </div>
        </div>
    </div>

    <div id="sticky-bar" class="hidden">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Total Bayaran</p>
                <h3 id="bar-total" class="text-xl font-black text-emerald-400 tracking-tighter">RM 0.00</h3>
            </div>
            <button onclick="toggleCart()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-blue-600/30">
                PROSES BAYAR <i class="fas fa-chevron-up ml-2"></i>
            </button>
        </div>
    </div>

    <div id="cart-panel" class="glass p-6 flex flex-col bg-[#020617]">
        <div class="flex justify-between items-center mb-8">
            <button onclick="toggleCart()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center"><i class="fas fa-times"></i></button>
            <h2 class="font-black text-lg uppercase italic text-blue-500">Bayaran</h2>
            <div class="w-12"></div>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto space-y-3 no-scrollbar"></div>

        <div class="mt-6 space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setMethod('Cash', this)" class="pay-method active glass p-4 rounded-2xl text-[8px] font-bold uppercase tracking-widest flex flex-col items-center gap-1">Tunai</button>
                <button onclick="setMethod('Online', this)" class="pay-method glass p-4 rounded-2xl text-[8px] font-bold uppercase tracking-widest flex flex-col items-center gap-1 text-slate-500">Online</button>
                <button onclick="setMethod('Card', this)" class="pay-method glass p-4 rounded-2xl text-[8px] font-bold uppercase tracking-widest flex flex-col items-center gap-1 text-slate-500">Kad</button>
            </div>
            <div class="glass p-5 rounded-[2rem] flex justify-between items-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Grand Total</span>
                <span id="cart-total" class="text-xl font-black text-emerald-400">RM 0.00</span>
            </div>
            <button onclick="confirmSale()" class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] text-[10px] uppercase tracking-[0.3em] mb-2">Sahkan & Rekod</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT2nlX1fjiGvXAuaBWein6e1BQOOCH8ew",
            authDomain: "ketick-os.firebaseapp.com",
            projectId: "ketick-os",
            storageBucket: "ketick-os.firebasestorage.app",
            messagingSenderId: "407192673747",
            appId: "1:407192673747:web:9196c8d72d77a642f02326"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let cart = [];
        let method = "Cash";

        db.collection("inventory").onSnapshot(snap => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div onclick="addToCart('${doc.id}', '${p.name}', ${p.price})" class="product-card glass p-5 rounded-[2rem] border-white/5">
                        <h3 class="font-black text-[10px] uppercase truncate mb-1">${p.name}</h3>
                        <p class="text-blue-500 font-black text-xs">RM ${parseFloat(p.price).toFixed(2)}</p>
                        <p class="text-[8px] font-bold text-slate-600 mt-2 uppercase">Stok: ${p.stock || 0}</p>
                    </div>
                `;
            });
        });

        function addToCart(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) cart[idx].qty += 1;
            else cart.push({ id, name, price, qty: 1 });
            updateUI();
        }

        function updateUI() {
            const bar = document.getElementById('sticky-bar');
            const list = document.getElementById('cart-items');
            list.innerHTML = "";
            let total = 0;
            cart.forEach((item, i) => {
                total += (item.price * item.qty);
                list.innerHTML += `<div class="glass p-4 rounded-xl flex justify-between items-center">
                    <span class="text-[9px] font-bold uppercase truncate w-32">${item.name}</span>
                    <span class="text-[10px] font-black italic">x${item.qty}</span>
                </div>`;
            });
            document.getElementById('bar-total').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('cart-total').innerText = `RM ${total.toFixed(2)}`;
            if(cart.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');
        }

        function toggleCart() { document.getElementById('cart-panel').classList.toggle('show'); }
        function setMethod(m, btn) {
            method = m;
            document.querySelectorAll('.pay-method').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function clearCart() { cart = []; updateUI(); }

        async function confirmSale() {
            if(cart.length === 0) return;
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            try {
                await db.collection("sales").add({
                    items: cart,
                    totalValue: total,
                    paymentMethod: method,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    date: new Date().toISOString().split('T')[0]
                });
                for(let item of cart) {
                    const ref = db.collection("inventory").doc(item.id);
                    await db.runTransaction(async (t) => {
                        const doc = await t.get(ref);
                        t.update(ref, { stock: Math.max(0, (doc.data().stock || 0) - item.qty) });
                    });
                }
                alert("Berjaya!");
                clearCart();
                toggleCart();
            } catch(e) { alert("Ralat!"); }
        }
    </script>
</body>
</html>
