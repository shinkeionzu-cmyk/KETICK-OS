<!DOCTYPE html>
<html lang="ms" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini POS | KETICK OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card:active { transform: scale(0.95); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen p-4 pb-32 lg:pb-4">

    <div class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='../index.html'" class="p-3 rounded-xl glass hover:bg-slate-800">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-bold">Mini POS <span class="text-blue-500 text-xs">V1.0</span></h1>
        <div class="p-3 rounded-xl glass text-emerald-500">
            <i class="fas fa-circle text-[10px] animate-pulse"></i> Cloud Live
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2">
            <div class="mb-4 relative">
                <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
                <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Cari produk..." class="w-full p-4 pl-12 rounded-2xl glass border-none focus:ring-2 focus:ring-blue-600 outline-none">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="product-grid">
                <p class="text-slate-500 p-10 col-span-full text-center">Memuatkan produk dari cloud...</p>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="rounded-3xl glass p-6 sticky top-4 border border-blue-500/20 shadow-2xl shadow-blue-900/10">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-shopping-cart text-blue-500"></i> Bakul
                </h2>
                
                <div id="cart-items" class="space-y-4 max-h-[40vh] overflow-y-auto mb-6 pr-2">
                    <p class="text-slate-500 text-center py-10 text-sm italic">Bakul kosong...</p>
                </div>

                <div class="space-y-2 border-t border-slate-800 pt-4">
                    <div class="flex justify-between text-sm text-slate-400">
                        <span>Subtotal</span>
                        <span id="subtotal">RM 0.00</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-white pt-2">
                        <span>TOTAL</span>
                        <span id="grand-total" class="text-blue-500">RM 0.00</span>
                    </div>
                </div>

                <button onclick="processPayment()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-blue-600/30 transition-all active:scale-95">
                    BAYAR SEKARANG
                </button>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="bg-white text-black w-full max-w-sm p-8 rounded-none shadow-2xl font-mono relative">
            <div class="text-center border-b border-dashed border-gray-300 pb-4 mb-4">
                <h2 class="font-bold text-xl uppercase italic tracking-tighter">KETICK OS</h2>
                <p class="text-[10px]">Digital Shoes & Services</p>
                <p class="text-[10px]" id="receipt-date"></p>
            </div>
            <div id="receipt-content" class="text-xs space-y-2 mb-4"></div>
            <div class="border-t border-dashed border-gray-300 pt-4 text-right">
                <p class="font-bold text-lg">TOTAL: <span id="receipt-total"></span></p>
            </div>
            <button onclick="closeReceipt()" class="w-full mt-6 bg-black text-white py-3 text-xs uppercase tracking-widest font-bold">Tutup & Reset</button>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, updateDoc, doc, onSnapshot } from "../firebase-config.js";

        let products = [];
        let cart = [];

        // 1. Ambil Data Produk dari Firestore secara Real-Time
        const q = collection(db, "inventory");
        onSnapshot(q, (snapshot) => {
            products = [];
            snapshot.forEach((doc) => {
                products.push({ id: doc.id, ...doc.data() });
            });
            renderProducts();
        });

        // 2. Papar Produk ke Skrin
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="addToCart('${p.id}')" class="product-card p-6 rounded-3xl glass hover:bg-blue-600/10 cursor-pointer transition-all border border-slate-800">
                    <div class="text-4xl mb-3">${p.category === 'Kasut' ? '👟' : '🧼'}</div>
                    <h3 class="font-bold text-sm">${p.name}</h3>
                    <p class="text-[10px] text-slate-500 mb-2 italic">Baki Stok: ${p.stock}</p>
                    <p class="text-blue-500 font-bold">RM ${p.price.toFixed(2)}</p>
                </div>
            `).join('');
        }

        // 3. Tambah Item ke Bakul
        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if (!product || product.stock <= 0) {
                alert("Maaf, stok habis!");
                return;
            }

            const inCart = cart.find(item => item.id === id);
            if (inCart) {
                if (inCart.qty < product.stock) {
                    inCart.qty++;
                } else {
                    alert("Stok di kedai tidak mencukupi!");
                }
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateUI();
        }

        // 4. Buang Item dari Bakul
        window.removeFromCart = function(id) {
            cart = cart.filter(item => item.id !== id);
            updateUI();
        }

        // 5. Kemaskini Interface Bakul
        window.updateUI = function() {
            const cartDiv = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartDiv.innerHTML = `<p class="text-slate-500 text-center py-10 text-sm italic">Bakul kosong...</p>`;
            } else {
                cartDiv.innerHTML = cart.map(item => `
                    <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-white/5">
                        <div>
                            <p class="font-bold text-sm">${item.name}</p>
                            <p class="text-xs text-slate-500">RM ${item.price.toFixed(2)} x ${item.qty}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-sm text-blue-400">RM ${(item.price * item.qty).toFixed(2)}</span>
                            <button onclick="removeFromCart('${item.id}')" class="text-red-500 hover:text-red-400 p-2">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('subtotal').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('grand-total').innerText = `RM ${total.toFixed(2)}`;
        }

        // 6. Proses Bayaran & Update Firestore
        window.processPayment = async function() {
            if (cart.length === 0) return alert("Pilih barang dulu sebelum bayar!");
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            try {
                // A. Simpan data jualan ke Firestore
                await addDoc(collection(db, "sales"), {
                    items: cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
                    total: total,
                    date: new Date().toISOString(),
                    timestamp: Date.now()
                });

                // B. Tolak baki stok secara automatik
                for (const item of cart) {
                    const productRef = doc(db, "inventory", item.id);
                    await updateDoc(productRef, {
                        stock: item.stock - item.qty
                    });
                }

                // C. Tunjuk Resit
                showReceiptModal(total);

            } catch (error) {
                console.error("Payment Error:", error);
                alert("Gagal memproses bayaran. Sila periksa sambungan internet.");
            }
        };

        function showReceiptModal(total) {
            const date = new Date().toLocaleString('ms-MY');
            document.getElementById('receipt-date').innerText = date;
            document.getElementById('receipt-total').innerText = `RM ${total.toFixed(2)}`;
            
            const receiptContent = cart.map(item => `
                <div class="flex justify-between italic">
                    <span>${item.name} x${item.qty}</span>
                    <span>RM ${(item.price * item.qty).toFixed(2)}</span>
                </div>
            `).join('');
            
            document.getElementById('receipt-content').innerHTML = receiptContent;
            document.getElementById('receipt-modal').style.display = 'flex';
        }

        window.closeReceipt = function() {
            cart = [];
            updateUI();
            document.getElementById('receipt-modal').style.display = 'none';
        }

        // 7. Fungsi Carian Produk
        window.searchProduct = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const gridItems = document.querySelectorAll('#product-grid > div');
            
            gridItems.forEach(item => {
                const name = item.querySelector('h3').innerText.toLowerCase();
                item.style.display = name.includes(term) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
